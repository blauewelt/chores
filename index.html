<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fairli</title>
<meta name="description" content="Fairli – wer macht was im Haushalt, und wer sammelt die Punkte.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#141A17">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12161F; --card:#1A2230; --ink:#EAF1EB; --muted:#91A1B8;
    --line:#2A3447; --accent:#84B2FF; --accent-press:#6B99E6;
    --gold:#E8B931; --red:#E8746A;
    --radius:14px;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.25);
    --display:'Bricolage Grotesque', system-ui, sans-serif;
    --body:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--body);
    font-size:17px; line-height:1.45; min-height:100dvh;
    padding-bottom:calc(100px + env(safe-area-inset-bottom));
  }
  header{padding:calc(16px + env(safe-area-inset-top)) 18px 4px; position:relative}
  header h1{font-family:var(--display); font-weight:800; font-size:34px; letter-spacing:-.02em; margin:0;
    background:linear-gradient(100deg, #EAF1EB, var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent}
  .headbtns{position:absolute; top:calc(16px + env(safe-area-inset-top)); right:14px; display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; max-width:62%}
  .iconbtn{border:1px solid var(--line); background:var(--card); border-radius:999px;
    padding:7px 13px; font-size:14px; font-weight:600; color:var(--ink); cursor:pointer}
  .syncdot{display:inline-block; width:8px; height:8px; border-radius:50%; background:#445248; margin-right:5px; vertical-align:1px}
  .syncdot.on{background:var(--accent)} .syncdot.err{background:var(--red)}

  .iam{display:flex; gap:8px; align-items:center; overflow-x:auto; padding:10px 18px 2px; scrollbar-width:none}
  .iam::-webkit-scrollbar{display:none}
  .iam .lbl{font-size:13px; font-weight:700; color:var(--muted); flex:0 0 auto; text-transform:uppercase; letter-spacing:.05em}
  .chip{display:flex; align-items:center; gap:7px; flex:0 0 auto;
    border:1px solid var(--line); background:var(--card); border-radius:999px;
    padding:6px 13px 6px 8px; font-size:15px; font-weight:600; color:var(--ink); cursor:pointer}
  .chip .dot{width:18px; height:18px; border-radius:50%; display:grid; place-items:center; color:#10140F; font-size:11px; font-weight:800}
  .chip[aria-pressed="true"]{border-color:var(--accent); box-shadow:inset 0 0 0 1.5px var(--accent)}

  .tabs{display:flex; gap:6px; padding:12px 18px 6px; position:sticky; top:0;
    background:linear-gradient(var(--bg) 80%, transparent); z-index:5}
  .tab{border:1px solid var(--line); background:var(--card); color:var(--muted);
    border-radius:999px; padding:9px 18px; font-size:16px; font-weight:600; cursor:pointer; font-family:var(--body)}
  .tab[aria-selected="true"]{background:var(--accent); border-color:var(--accent); color:#10140F}
  .tab:focus-visible, button:focus-visible, input:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

  main{padding:10px 14px 0}

  /* Chore-Tasten: Masonry, Grösse nach Punktwert, Reihenfolge nach Nutzung */
  .grid{columns:2; column-gap:12px}
  .chore{
    position:relative; overflow:hidden; text-align:left; cursor:pointer;
    width:100%; margin-bottom:12px; break-inside:avoid;
    font-family:var(--body); color:var(--ink); min-height:104px;
    background:linear-gradient(168deg,
      color-mix(in srgb, var(--c) 30%, var(--card)),
      color-mix(in srgb, var(--c) 10%, var(--card)));
    border:1px solid color-mix(in srgb, var(--c) 45%, var(--card));
    border-radius:18px;
    box-shadow:0 12px 20px rgba(0,0,0,.35);
    padding:18px 16px 15px;
    display:flex; flex-direction:column; justify-content:space-between; gap:10px;
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .chore:active{transform:translateY(2px);
    box-shadow:0 4px 8px rgba(0,0,0,.3)}
  .chore .art{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    opacity:.55; z-index:0; pointer-events:none}
  .chore::after{content:''; position:absolute; inset:0; z-index:1; pointer-events:none;
    background:linear-gradient(180deg, rgba(10,14,12,.6), rgba(10,14,12,.12) 55%, rgba(10,14,12,.55))}
  .chore .cname{font-weight:700; font-size:18px; line-height:1.25; overflow-wrap:break-word; padding-right:24px; position:relative; color:#fff; z-index:2; text-shadow:0 1px 4px rgba(0,0,0,.6)}
  .chore .cnote{font-weight:500; font-size:12px; line-height:1.2; margin-top:2px; padding-right:24px;
    position:relative; z-index:2; color:rgba(255,255,255,.82); text-shadow:0 1px 3px rgba(0,0,0,.7);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .chore .pts{align-self:flex-start; position:relative; z-index:2;
    font-family:var(--display); font-weight:800; font-size:20px;
    color:color-mix(in srgb, var(--c) 65%, #fff);
    background:color-mix(in srgb, var(--c) 28%, transparent);
    border-radius:999px; padding:4px 15px}
  .chore .edit{position:absolute; top:0; right:0; width:52px; height:52px;
    display:flex; align-items:center; justify-content:center; border:none;
    background:none; color:rgba(255,255,255,.75); font-size:17px; cursor:pointer;
    border-radius:0 14px 0 14px; z-index:2}
  .chore .edit:active{background:rgba(255,255,255,.12)}
  .chore.flash{animation:flash .5s ease}
  @keyframes flash{0%{filter:brightness(1.4) saturate(1.4)} 100%{filter:none}}

  .score{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:14px; margin-bottom:8px}
  .score .top{display:flex; align-items:center; gap:11px}
  .score .dot{width:32px; height:32px; border-radius:50%; display:grid; place-items:center; color:#10140F; font-weight:800; font-size:15px; flex:0 0 32px}
  .score .name{font-weight:700; font-size:18px; flex:1}
  .score .num{font-family:var(--display); font-weight:800; font-size:34px}
  .score .bar{height:10px; border-radius:999px; background:#252F29; margin-top:10px; overflow:hidden}
  .score .bar i{display:block; height:100%; border-radius:999px}
  .score .sub{font-size:14px; color:var(--muted); margin-top:6px}
  .period{display:flex; gap:6px; margin:4px 4px 12px}
  .period button{border:1px solid var(--line); background:var(--card); border-radius:999px;
    padding:6px 14px; font-size:14px; font-weight:600; color:var(--muted); cursor:pointer}
  .period button[aria-pressed="true"]{background:var(--accent); color:#10140F; border-color:var(--accent)}

  .entry{display:flex; align-items:center; gap:10px; background:var(--card);
    border:1px solid var(--line); border-radius:var(--radius); padding:11px 13px; margin-bottom:8px}
  .entry .dot{width:14px; height:14px; border-radius:50%; flex:0 0 14px}
  .entry .what{flex:1; min-width:0}
  .entry .what b{font-weight:700}
  .entry .when{font-size:12.5px; color:var(--muted)}
  .entry .pts{font-family:var(--display); font-weight:800; font-size:19px; color:var(--accent)}
  .entry .undo{border:none; background:none; color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; padding:6px}

  .empty{text-align:center; color:var(--muted); padding:48px 24px}
  .empty b{display:block; font-family:var(--display); font-weight:700; font-size:18px; color:var(--ink); margin-bottom:4px}

  .fab{position:fixed; right:18px; bottom:calc(20px + env(safe-area-inset-bottom));
    width:64px; height:64px; border-radius:50%; border:none; cursor:pointer;
    background:var(--accent); color:#10140F; font-size:30px; line-height:1;
    box-shadow:0 6px 18px rgba(82,192,138,.35); z-index:20; transition:transform .1s ease}
  .fab:active{transform:scale(.92); background:var(--accent-press)}

  dialog{border:none; border-radius:20px 20px 0 0; padding:0; width:100%; max-width:560px;
    margin:auto auto 0; background:var(--card); color:var(--ink)}
  dialog::backdrop{background:rgba(0,0,0,.55)}
  .sheet{padding:20px 20px calc(20px + env(safe-area-inset-bottom))}
  .sheet h2{font-family:var(--display); font-weight:700; font-size:20px; margin:0 0 14px}
  .field{margin-bottom:14px}
  .field label{display:block; font-size:13px; font-weight:600; color:var(--muted); margin-bottom:5px}
  .field input[type=text], .field input[type=number], .field input[type=url], .field input[type=password]{
    width:100%; padding:11px 12px; font-size:16px; font-family:var(--body);
    border:1px solid var(--line); border-radius:10px; background:#161D19; color:var(--ink)}
  .actions{display:flex; gap:10px; margin-top:18px}
  .btn{flex:1; padding:13px; border-radius:12px; font-size:16px; font-weight:700; font-family:var(--body);
    cursor:pointer; border:1px solid var(--line); background:#161D19; color:var(--ink)}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#10140F}
  .btn.primary:active{background:var(--accent-press)}
  .btn.danger{color:var(--red); border-color:var(--red); background:none}
  .hint{font-size:13px; color:var(--muted); margin-top:10px}

  .sheetbar{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:16px}
  .sheetbar h2{margin:0; font-size:18px; flex:1; text-align:center}
  .barbtn{border:none; background:none; font-size:16px; font-weight:600; color:var(--muted);
    cursor:pointer; padding:8px 4px; font-family:var(--body); min-width:84px; text-align:left}
  .barbtn.strong{color:var(--accent); font-weight:800; text-align:right}
  .btn.wide{width:100%; margin-top:6px}

  .namerow{display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:11px 0 11px 12px; border:1px solid var(--line); border-radius:10px; background:#161D19}
  .namerow span{font-weight:700; font-size:17px; overflow-wrap:anywhere}
  .namerow .barbtn{min-width:auto; flex:0 0 auto; color:var(--accent); padding:8px 12px}
  .ptsrow{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:2px}
  .ptsrow output{font-family:var(--display); font-weight:800; font-size:30px; color:var(--accent)}
  input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:40px; background:none; margin:0}
  input[type=range]::-webkit-slider-runnable-track{height:12px; border-radius:999px;
    background:linear-gradient(to right, var(--accent) var(--fill,20%), #252F29 var(--fill,20%))}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:30px; height:30px; border-radius:50%;
    background:#fff; border:4px solid var(--accent); margin-top:-9px; box-shadow:0 2px 8px rgba(0,0,0,.45)}
  input[type=range]::-moz-range-track{height:12px; border-radius:999px; background:#252F29}
  input[type=range]::-moz-range-progress{height:12px; border-radius:999px; background:var(--accent)}
  input[type=range]::-moz-range-thumb{width:26px; height:26px; border-radius:50%; background:#fff; border:4px solid var(--accent)}

  .mrow{display:flex; gap:8px; align-items:center; margin-bottom:8px}
  .mrow input[type=text]{flex:1; padding:10px 12px; font-size:16px; border:1px solid var(--line); border-radius:10px; background:#161D19; color:var(--ink)}
  .mrow input[type=color]{width:42px; height:42px; border:none; background:none; padding:0; cursor:pointer}
  .mrow .del{border:none; background:none; font-size:20px; color:var(--muted); cursor:pointer; padding:6px}
  .mrow .mlink{border:none; background:none; font-size:17px; cursor:pointer; padding:6px; min-width:36px}
  #shareSheet{border:none; background:var(--card); color:var(--ink); border-radius:20px 20px 0 0; padding:0; width:100%; max-width:520px; margin:auto auto 0; position:fixed; inset:auto 0 0 0}
  #shareSheet::backdrop{background:rgba(0,0,0,.5)}
  #shareSheet .x{border:none; background:none; color:var(--muted); font-size:24px; cursor:pointer; line-height:1; padding:0 4px}
  .shrow{padding:14px 0; border-top:1px solid var(--line); display:flex; flex-direction:column; align-items:center; gap:10px}
  .shrow:first-of-type{border-top:none}
  .shhead{display:flex; align-items:center; gap:10px; width:100%}
  .shname{flex:1; font-weight:600; font-size:16px}
  .shbtn{border:none; border-radius:999px; padding:9px 18px; font-size:15px; font-weight:700; background:var(--accent); color:#0C1220; cursor:pointer}
  .shqr{border-radius:12px; background:#fff; padding:8px; margin:10px auto 0; display:block}
  .shqr[hidden]{display:none}
  .qrtog{border:1px solid var(--line); background:var(--card); color:var(--muted); border-radius:999px;
    padding:8px 13px; font-size:13px; font-weight:700; cursor:pointer; margin-right:8px}
  .qrtog.on{background:color-mix(in srgb, var(--accent) 22%, transparent); color:var(--ink); border-color:transparent}
  .shfam .shname{color:var(--muted); font-size:14px}
  .addmember{border:1px dashed var(--line); background:none; width:100%; padding:11px; border-radius:10px; color:var(--muted); font-weight:600; cursor:pointer; font-size:15px}

  #toast{position:fixed; left:50%; transform:translateX(-50%) translateY(20px);
    bottom:calc(100px + env(safe-area-inset-bottom)); background:var(--ink); color:#141A17;
    padding:10px 20px; border-radius:999px; font-weight:700; opacity:0; pointer-events:none;
    transition:opacity .2s, transform .2s; z-index:50; max-width:85vw; text-align:center}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important} }
</style>
</head>
<body>
<header>
  <h1>Fairli</h1>
  <div class="headbtns">
    <button class="iconbtn" id="openSync"><span class="syncdot" id="syncDot"></span>Sync</button>
    <button class="iconbtn" id="openShareTop">Teilen</button>
    <button class="iconbtn" id="openMembers">Personen</button>
  </div>
</header>

<div class="iam" id="iamRow"></div>

<div class="tabs" role="tablist">
  <button class="tab" role="tab" data-view="chores" aria-selected="true">Aufgaben</button>
  <button class="tab" role="tab" data-view="scores" aria-selected="false">Punkte</button>
  <button class="tab" role="tab" data-view="log" aria-selected="false">Verlauf</button>
</div>

<main id="list"></main>

<button class="fab" id="openAdd" aria-label="Aufgabe hinzufügen">+</button>

<dialog id="choreSheet">
  <form class="sheet" method="dialog" id="choreForm">
    <div class="sheetbar">
      <button type="button" class="barbtn" id="cancelChore">Abbrechen</button>
      <h2 id="choreSheetTitle">Neue Aufgabe</h2>
      <button type="submit" class="barbtn strong">Speichern</button>
    </div>
    <div class="field">
      <label for="cName">Aufgabe</label>
      <div class="namerow" id="nameStatic" style="display:none">
        <span id="nameText"></span>
        <button type="button" class="barbtn" id="editName">✎ Ändern</button>
      </div>
      <input type="text" id="cName" placeholder="z. B. Geschirrspüler ausräumen" required maxlength="80" autocomplete="off">
    </div>
    <div class="field">
      <div class="ptsrow"><label for="cPts">Punkte</label><output id="cPtsVal" for="cPts">3</output></div>
      <input type="range" id="cPts" min="0" max="15" step="1" value="3">
    </div>
    <div class="field">
      <label for="cNote">Notiz <span style="font-weight:400;color:var(--muted)">(optional)</span></label>
      <input type="text" id="cNote" placeholder="kurze Erklärung, z. B. «nur Restmüll»" maxlength="60" autocomplete="off">
    </div>
    <button type="button" class="btn danger wide" id="deleteChore" style="display:none">Aufgabe löschen</button>
  </form>
</dialog>

<dialog id="memberSheet">
  <div class="sheet">
    <div class="sheetbar">
      <span></span>
      <h2>Personen</h2>
      <button type="button" class="barbtn strong" id="closeMembers">Fertig</button>
    </div>
    <div id="memberRows"></div>
    <button class="addmember" id="addMember">+ Person hinzufügen</button>
  </div>
</dialog>

<dialog id="syncSheet">
  <div class="sheet">
    <h2>Geräte verbinden</h2>
    <p class="hint" style="margin-top:0">Mit einem (kostenlosen) Supabase-Projekt teilen alle Geräte dieselben Aufgaben und Punkte. URL und Key einmal pro Gerät eintragen.</p>
    <div class="field">
      <label for="sUrl">Projekt-URL</label>
      <input type="url" id="sUrl" placeholder="https://xxxx.supabase.co" autocomplete="off">
    </div>
    <div class="field">
      <label for="sKey">Anon/Publishable Key</label>
      <input type="password" id="sKey" placeholder="eyJ… oder sb_publishable_…" autocomplete="off">
    </div>
    <div class="hint" id="syncStatus"></div>
    <div class="actions">
      <button class="btn" id="disconnectSync">Trennen</button>
      <button class="btn primary" id="saveSync">Verbinden</button>
    </div>
  </div>
</dialog>

<div id="toast" role="status"></div>

<script src="qrcode.min.js"></script>
<script>
(() => {
  const APP_VERSION = '4.9.0';
  const uid = () => Math.random().toString(36).slice(2, 10);

  // ---------- Familien-Routing ----------
  // #f/<familie>           → Familien-Link (voller Zugriff)
  // #f/<familie>/u/<slug>  → persönlicher Link (Punkte nur für sich selbst)
  const LS_ROUTE = 'haushalt.route';
  const BASE = location.pathname.replace(/index\.html$/, '').replace(/[^/]*$/, '');
  function parseRouteString(s) {
    if (!s) return null;
    const m = s.match(/f\/([a-z0-9-]{4,64})(?:\/u\/([a-z0-9]{4,64}))?/i);
    return m ? { family: m[1].toLowerCase(), userSlug: m[2] ? m[2].toLowerCase() : null } : null;
  }
  function saveRoute(r) { try { localStorage.setItem(LS_ROUTE, JSON.stringify(r)); } catch {} }
  function loadRoute() { try { return JSON.parse(localStorage.getItem(LS_ROUTE)); } catch { return null; } }
  // kanonische Pfad-URL einer Familie/Person (für Teilen & Homescreen-Install)
  function routeUrl(family, slug) {
    return location.origin + BASE + 'f/' + family + (slug ? '/u/' + slug : '');
  }

  // Reihenfolge der Quellen: ?r= (vom 404-Handoff), echter Pfad, Hash (legacy).
  let route = null;
  const qr = new URLSearchParams(location.search).get('r');
  if (qr) route = parseRouteString(qr);
  if (!route) {
    const afterBase = location.pathname.slice(BASE.length);
    route = parseRouteString(afterBase);
  }
  if (!route) route = parseRouteString(location.hash.replace(/^#\/?/, ''));

  if (route) {
    saveRoute(route);
    // URL auf saubere Pfadform bringen, ohne Reload (auch für Standalone-Reloads)
    try { history.replaceState(null, '', routeUrl(route.family, route.userSlug)); } catch {}
  } else {
    route = loadRoute();
    if (route && route.family) {
      try { history.replaceState(null, '', routeUrl(route.family, route.userSlug)); } catch {}
    }
  }
  const FAMILY = (route && route.family) || null;
  const USER_SLUG = (route && route.userSlug) || null;

  window.addEventListener('popstate', () => {
    const r = parseRouteString(location.pathname.slice(BASE.length)) ||
              parseRouteString(location.hash.replace(/^#\/?/, ''));
    if (r && (!route || r.family !== route.family || r.userSlug !== route.userSlug)) {
      saveRoute(r); location.reload();
    }
  });

  const LS_STATE = 'haushalt.v2:' + FAMILY;
  const LS_CFG   = 'haushalt.sync';
  const LS_ME    = 'haushalt.me:' + FAMILY;
  const CHORE_COLORS = ['#52C08A','#E8B931','#5FA8E8','#E8746A','#B585E8',
                        '#E89C4B','#4BC4C4','#E86AA8','#A8C45B','#8A93E8'];
  const choreColor = id => {
    let x = 0; for (const ch of String(id)) x = (x * 31 + ch.charCodeAt(0)) >>> 0;
    return CHORE_COLORS[x % CHORE_COLORS.length];
  };
  const choreSeed = id => {
    let x = 0; for (const ch of String(id)) x = (x * 31 + ch.charCodeAt(0)) >>> 0;
    return x % 100000;
  };
  const choreArt = c => 'https://gen.pollinations.ai/image/' +
    encodeURIComponent('minimalist flat vector illustration of household chore: ' + c.name +
      ', single object, dark moody background, vibrant accent color, no text') +
    '?model=flux&width=440&height=300&key=pk_s3BNDnxTvRHULT3z&seed=' + choreSeed(c.id);
  const palette = ['#2F6B4F','#B8860B','#3A6EA5','#B23A2E','#7A4FA0','#3E8E7E'];

  // ---------- Einstieg (kein Familien-Link aktiv) ----------
  // Wichtig: iOS startet die Homescreen-App immer am start_url OHNE Hash
  // (Apple ignoriert dynamische Manifeste und Hash im start_url). Darum darf
  // dieser Screen KEINE Sackgasse sein: «Wieder beitreten» steht zuvorderst.
  if (!FAMILY) {
    const last = loadRoute();
    const goto = (fam, slug) => {
      saveRoute({ family: fam, userSlug: slug || null });
      location.href = routeUrl(fam, slug);
    };
    function parseAny(input) {
      // akzeptiert vollen Pfad-Link, Hash-Link, oder nur den Familien-Slug
      input = (input || '').trim();

  // ---------- State ----------
  let state = { members: [], chores: [], log: [], famName: '' };

  // Fest eingebaute Sync-Konfiguration (gilt für alle Geräte; im Sync-Sheet übersteuerbar)
  const DEFAULT_SYNC = {
    url: 'https://uggipomhmnnmiqpbpxcc.supabase.co',
    key: 'sb_publishable_dUNwr1xg5TJxkAoYjmR1Ug_y1U3SNt8'
  };

  let cfg = null;
  try {
    const stored = JSON.parse(localStorage.getItem(LS_CFG));

  const initial = n => (n || '?').trim().charAt(0).toUpperCase();

  // ---------- Supabase REST ----------
  const famScope = path => path + (path.includes('?') ? '&' : '?') + 'family_id=eq.' + encodeURIComponent(FAMILY);
  const famRows = b => Array.isArray(b)
    ? b.map(r => Object.assign({ family_id: FAMILY }, r))
    : Object.assign({ family_id: FAMILY }, b);
  async function sb(path, method = 'GET', body) {
    if (body && (method === 'POST' || method === 'PATCH')) body = famRows(body);
    const r = await fetch(cfg.url.replace(/\/+$/, '') + '/rest/v1/' + famScope(path), {
      method,
      headers: {
        apikey: cfg.key, Authorization: 'Bearer ' + cfg.key,
        'Content-Type': 'application/json', Prefer: 'return=minimal'
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!r.ok) throw new Error(method + ' ' + path + ' → ' + r.status);
    return method === 'GET' ? r.json() : null;
  }

  async function upsert(table, rows) {
    if (!rows.length) return;
    rows = famRows(rows);
    const r = await fetch(cfg.url.replace(/\/+$/, '') + '/rest/v1/' + famScope(table), {
      method: 'POST',
      headers: { apikey: cfg.key, Authorization: 'Bearer ' + cfg.key,
        'Content-Type': 'application/json',
        Prefer: 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify(rows)
    });
    if (!r.ok) throw new Error('upsert ' + table + ' → ' + r.status);
  }

  async function pull() {
    if (!cfg) return;
    try {
      const [members, chores, log, fam] = await Promise.all([
        sb('members?select=*&order=name'),
        sb('chores?select=*&order=points.desc,name'),
        sb('log?select=*&order=done_at.desc&limit=300'),
        sb('families?select=name')
      ]);
      state.famName = (fam[0] && fam[0].name) || '';
      // Während die Ersteinrichtung offen ist, NICHTS am DOM/State anfassen –
      // sonst werden Eingaben überschrieben.
      if (firstRunOpen) { syncOk = true; return; }
      if (!members.length && !state.famName && !USER_SLUG) {
        // Komplett neue Familie → Ersteinrichtung (nur einmal)
        syncOk = true; firstRunSetup(); return;
      }
      if (!members.length) {
        // Leeres Backend → dieses Gerät lädt seinen lokalen Stand hoch
        await upsert('members', state.members);
        await upsert('chores', state.chores);
        await upsert('log', state.log);
      } else {
        state.members = members;
        state.chores = chores;
        state.log = log;
      }
      if (USER_SLUG) {
        const lm = state.members.find(m => (m.url_slug || '').toLowerCase() === USER_SLUG);
        if (lm) { me = lm.id; localStorage.setItem(LS_ME, me); }
        else if (state.members.length) { showBadLink(); return; }
      }
      syncOk = true; save(); render();
    } catch (e) { syncOk = false; render(); }
  }

  function push(fn) {           // optimistisches Schreiben

  // ---------- Punkte ----------
  function weekStart() {
    const d = new Date(); d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() - ((d.getDay() + 6) % 7)); // Montag
    return d.toISOString();
  }
  function totals() {
    const since = period === 'week' ? weekStart() : '';
    const t = {};
    state.members.forEach(m => t[m.id] = { pts: 0, n: 0 });
    state.log.forEach(e => {
      if (e.done_at >= since && t[e.member_id]) { t[e.member_id].pts += e.points; t[e.member_id].n++; }
    });
    return t;
  }

  // ---------- Rendering ----------
  const listEl = document.getElementById('list');

  // ---------- Eingefrorene Kachel-Reihenfolge ----------
  // Wird einmal berechnet und erst neu gebildet, wenn der Nutzer es erwartet
  // (App-Start, Tab-Wechsel, Aufgabe angelegt/geändert/gelöscht) – nie durch
  // einen Hintergrund-Sync, damit nichts unter dem Finger wegspringt.
  let _orderCache = null;
  let _pinned = [];                       // frisch hinzugefügte Aufgaben: vorne, neueste zuerst
  function invalidateOrder() { _orderCache = null; }
  function pinChore(id) { _pinned = _pinned.filter(x => x !== id); _pinned.unshift(id); invalidateOrder(); }
  function choreOrder() {
    const ids = state.chores.map(c => c.id).sort().join('|');
    if (_orderCache && _orderCache.ids === ids) {
      // Gleiche Aufgaben-Menge → gemerkte Reihenfolge halten, nur fehlende
      // (theoretisch) ans Ende, gelöschte raus.
      const byId = new Map(state.chores.map(c => [c.id, c]));
      const kept = _orderCache.order.filter(id => byId.has(id)).map(id => byId.get(id));
      return applyPins(kept);
    }
    const counts = {};
    state.log.forEach(e => counts[e.chore_id] = (counts[e.chore_id] || 0) + 1);
    const groupKey = n => (n || '').trim().split(/\s+/)[0].toLowerCase();
    const groupUse = {}, groupName = {};
    state.chores.forEach(c => {
      const g = groupKey(c.name);
      groupUse[g] = (groupUse[g] || 0) + (counts[c.id] || 0);
      if (!groupName[g] || c.name.localeCompare(groupName[g], 'de', { sensitivity: 'base' }) < 0)
        groupName[g] = c.name;
    });
    const ordered = state.chores.slice().sort((a, b) => {
      const ga = groupKey(a.name), gb = groupKey(b.name);
      if (ga !== gb)
        return (groupUse[gb] - groupUse[ga])
            || groupName[ga].localeCompare(groupName[gb], 'de', { sensitivity: 'base' });
      return a.name.localeCompare(b.name, 'de', { sensitivity: 'base' });
    });
    const pinnedFirst = applyPins(ordered);
    _orderCache = { ids, order: pinnedFirst.map(c => c.id) };
    return pinnedFirst;
  }
  function applyPins(list) {
    if (!_pinned.length) return list;
    const byId = new Map(list.map(c => [c.id, c]));
    const front = _pinned.map(id => byId.get(id)).filter(Boolean);
    const frontIds = new Set(_pinned);
    return front.concat(list.filter(c => !frontIds.has(c.id)));
  }

  function render() {
    renderSyncDot();
    const h1 = document.querySelector('header h1');
    if (h1 && state.famName) { h1.textContent = state.famName; document.title = state.famName; }
    document.querySelectorAll('.tab').forEach(b =>
      b.setAttribute('aria-selected', String(b.dataset.view === view)));

    // Ich bin — im persönlichen Link fest auf eine Person verriegelt
    const iam = document.getElementById('iamRow');

        <span class="dot" style="background:${esc(m.color)}">${esc(initial(m.name))}</span>${esc(m.name)}
      </button>`).join('') + (USER_SLUG && !shown.length ? '<span class="lbl">…</span>' : '');

    if (view === 'chores') {
      // Reihenfolge ist eingefroren (siehe choreOrder()); Hintergrund-Syncs
      // aktualisieren Daten/Punkte, ordnen die Kacheln aber nicht um.
      const ordered = choreOrder();
      listEl.innerHTML = ordered.length
        ? `<div class="grid">` + ordered.map(c =>
            `<button class="chore" data-cid="${c.id}" style="--c:${choreColor(c.id)}; min-height:${Math.round(104 + 34 * Math.log2(c.points + 1))}px">

              <span class="edit" data-edit="${c.id}" role="button" aria-label="Bearbeiten">✎</span>

        : `<div class="empty"><b>Noch keine Aufgaben</b>Lege mit + die erste an – z. B. «Geschirrspüler ausräumen, 3 Punkte».</div>`;
    } else if (view === 'scores') {
      const t = totals();
      const max = Math.max(1, ...Object.values(t).map(x => x.pts));
      const ranked = state.members.slice().sort((a, b) => t[b.id].pts - t[a.id].pts);
      listEl.innerHTML =
        `<div class="period">
          <button data-p="week" aria-pressed="${period === 'week'}">Diese Woche</button>
          <button data-p="all" aria-pressed="${period === 'all'}">Gesamt</button>
        </div>` +
        ranked.map((m, i) => `
          <div class="score">
            <div class="top">
              <span class="dot" style="background:${esc(m.color)}">${esc(initial(m.name))}</span>
              <span class="name">${esc(m.name)}${i === 0 && t[m.id].pts > 0 ? ' 👑' : ''}</span>
              <span class="num">${t[m.id].pts}</span>
            </div>
            <div class="bar"><i style="width:${Math.round(t[m.id].pts / max * 100)}%; background:${esc(m.color)}"></i></div>
            <div class="sub">${t[m.id].n} Aufgabe${t[m.id].n === 1 ? '' : 'n'} erledigt</div>
          </div>`).join('');
    } else {
      listEl.innerHTML = state.log.length
        ? state.log.map(e => {
            const m = memberById(e.member_id);
            const d = new Date(e.done_at);
            return `<div class="entry">
              <span class="dot" style="background:${esc(m ? m.color : '#C2CCC5')}"></span>
              <span class="what"><b>${esc(e.member_name)}</b> · ${esc(e.chore_name)}
                <div class="when">${d.toLocaleDateString('de-CH', { weekday: 'short', day: 'numeric', month: 'short' })}, ${d.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' })}</div>
              </span>
              <span class="pts">+${e.points}</span>
              <button class="undo" data-undo="${e.id}">↩︎</button>
            </div>`;
          }).join('')
        : `<div class="empty"><b>Noch nichts erledigt</b>Jede gedrückte Aufgabe landet hier.</div>`;
    }
  }

  // ---------- Aufgaben-Sheet ----------

    if (editingChore) {
      const c = state.chores.find(x => x.id === editingChore);
      c.name = name; c.points = points; c.note = note;
      push(() => sb('chores?id=eq.' + c.id, 'PATCH', { name, points, note }));
    } else {
      const c = { id: uid(), name, points, note };
      state.chores.push(c);
      push(() => sb('chores', 'POST', c));
      pinChore(c.id);
      justAdded = c.id;
    }
    invalidateOrder();
    save(); render();
    if (justAdded) {
      const el = document.querySelector('.chore[data-cid="' + justAdded + '"]');
      if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('flash'); setTimeout(() => el.classList.remove('flash'), 500); }
      justAdded = null;
    }
  });

  // ---------- Personen-Sheet ----------
  const memberSheet = document.getElementById('memberSheet');
  const changedMembers = new Set();
  function renderMemberRows() {
    const wrap = document.getElementById('memberRows');
    wrap.innerHTML = state.members.map(m =>
      `<div class="mrow" data-mid="${m.id}">
        <input type="color" value="${esc(m.color)}" aria-label="Farbe">
        <input type="text" maxlength="30" aria-label="Name">
        <button class="mlink" aria-label="Persönlichen Link kopieren" title="Persönlicher Link">🔗</button>
        <button class="del" aria-label="Person entfernen">×</button>
      </div>`).join('');
    wrap.querySelectorAll('.mrow').forEach((r, i) => r.querySelector('input[type=text]').value = state.members[i].name);
  }
  const _shareTop = document.getElementById('openShareTop');
  if (_shareTop) _shareTop.addEventListener('click', () => openShareSheet(''));
  document.getElementById('openMembers').addEventListener('click', () => {
    changedMembers.clear(); renderMemberRows();
    let fl = document.getElementById('famLink');
    if (!fl) {
      fl = document.createElement('button');
      fl.id = 'famLink'; fl.textContent = 'Familien-Link kopieren';
      fl.style.cssText = 'margin-top:12px;width:100%;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:12px;padding:12px;font-size:15px;font-weight:600;cursor:pointer';
      fl.textContent = 'Links teilen …';
      fl.onclick = () => { memberSheet.close(); openShareSheet(''); };
      document.getElementById('memberRows').after(fl);
    }
    memberSheet.showModal();
  });
  document.getElementById('memberRows').addEventListener('input', e => {
    const row = e.target.closest('.mrow'); if (!row) return;
    const m = memberById(row.dataset.mid); if (!m) return;
    if (e.target.type === 'text') m.name = e.target.value;
    if (e.target.type === 'color') m.color = e.target.value;
    changedMembers.add(m.id); save();
  });
  const appBase = () => location.origin + location.pathname;
  const familyLink = () => routeUrl(FAMILY, null);
  const appLink = () => location.origin + BASE;
  function ensureSlug(m) {
    if (!m.url_slug) { m.url_slug = uid() + uid(); save(); push(() => upsert('members', [m])); }
    return m.url_slug;
  }
  const userLink = m => routeUrl(FAMILY, ensureSlug(m));

  // Teilen: native Share-Sheet bevorzugt, sonst Clipboard, sonst Anzeige
  async function shareLink(url, title, text) {
    if (navigator.share) {
      try { await navigator.share({ title, text, url }); return; } catch (e) { if (e && e.name === 'AbortError') return; }
    }
    try { await navigator.clipboard.writeText(url); toast(title + ' kopiert'); }
    catch { toast(url); }
  }
  function qrDataUrl(text) {
    try {
      const q = qrcode(0, 'M'); q.addData(text); q.make();
      return q.createDataURL(6, 16); // cellSize, margin
    } catch { return null; }
  }

  // Wiederverwendbares Sheet: alle persönlichen Links + Familien-Link, je mit
  // Teilen-Button und QR-Code.
  function openShareSheet(intro) {
    let sh = document.getElementById('shareSheet');
    if (!sh) {
      sh = document.createElement('dialog');
      sh.id = 'shareSheet';
      document.body.appendChild(sh);
    }
    const rows = state.members.map(m => {
      const url = userLink(m);
      const qr = qrDataUrl(url);
      return `<div class="shrow">
        <div class="shhead">
          <span class="dot" style="background:${esc(m.color)}">${esc(initial(m.name))}</span>
          <span class="shname">${esc(m.name || '—')}</span>
          ${qr ? `<button class="qrtog" aria-label="QR-Code anzeigen">QR</button>` : ''}
          <button class="shbtn" data-share="${esc(url)}" data-name="${esc(m.name || '')}">Teilen</button>
        </div>
        ${qr ? `<img class="shqr" src="${qr}" alt="QR-Code für ${esc(m.name)}" width="116" height="116" hidden>` : ''}
      </div>`;
    }).join('');
    const famQr = qrDataUrl(familyLink());
    const appQr = qrDataUrl(appLink());
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const installTip = isIOS
      ? 'Zum Installieren: «Teilen» → «Zum Home-Bildschirm».'
      : 'Zum Installieren: Menü (⋮) → «Zum Startbildschirm».';
    sh.innerHTML = `<div class="sheet">
      <div class="sheetbar"><h2>Teilen</h2><button class="x" id="closeShare" aria-label="Schließen">×</button></div>
      <div class="shrow shfam" style="border-top:none;padding-top:4px">
        <div class="shhead">
          <span class="shname">Ganze Familie<br><span style="font-weight:400;color:var(--muted);font-size:12.5px">voller Zugriff</span></span>
          ${famQr ? `<button class="qrtog" aria-label="QR-Code anzeigen">QR</button>` : ''}
          <button class="shbtn" data-share="${esc(familyLink())}" data-name="Familie">Teilen</button>
        </div>
        ${famQr ? `<img class="shqr" src="${famQr}" alt="Familien-QR" width="116" height="116" hidden>` : ''}
        <div style="color:var(--muted);font-size:12px;text-align:center;margin-top:6px">📲 ${esc(installTip)}</div>
      </div>
      <div style="font-weight:700;font-size:14px;color:var(--muted);margin:18px 0 2px">Persönliche Links</div>
      ${rows}
      <div class="shrow" style="border-top:1px solid var(--line)">
        <div class="shhead">
          <span class="shname">Fairli weiterempfehlen<br><span style="font-weight:400;color:var(--muted);font-size:12.5px">Link für einen neuen Haushalt</span></span>
          ${appQr ? `<button class="qrtog" aria-label="QR-Code anzeigen">QR</button>` : ''}
          <button class="shbtn" data-share="${esc(appLink())}" data-app="1">Teilen</button>
        </div>
        ${appQr ? `<img class="shqr" src="${appQr}" alt="Fairli-QR" width="116" height="116" hidden>` : ''}
      </div>
    </div>`;
    sh.querySelector('#closeShare').onclick = () => sh.close();
    sh.querySelectorAll('.qrtog').forEach(t => t.onclick = () => {
      const img = t.closest('.shrow').querySelector('.shqr');
      if (!img) return;
      const show = img.hasAttribute('hidden');
      if (show) { img.removeAttribute('hidden'); t.classList.add('on'); }
      else { img.setAttribute('hidden', ''); t.classList.remove('on'); }
    });
    sh.querySelectorAll('.shbtn').forEach(b => b.onclick = () => {
      if (b.dataset.app) {
        shareLink(b.dataset.share, 'Fairli', 'Fairli – Haushaltsaufgaben fair verteilt. Erstell hier euren Haushalt:');
        return;
      }
      const nm = b.dataset.name;
      shareLink(b.dataset.share, nm ? 'Link für ' + nm : 'Familien-Link',
                nm ? nm + ', mach mit bei ' + (state.famName || 'unseren Aufgaben') + ':' : 'Mach mit bei ' + (state.famName || 'unseren Aufgaben') + ':');
    });
    sh.showModal();
  }
  document.getElementById('memberRows').addEventListener('click', async e => {
    const lk = e.target.closest('.mlink');
    if (lk) { memberSheet.close(); openShareSheet(''); return; }
    if (!e.target.closest('.del')) return;
    const row = e.target.closest('.mrow');
    if (state.members.length <= 1) { alert('Mindestens eine Person wird benötigt.'); return; }
    const id = row.dataset.mid;
    if (!confirm('Person entfernen? Ihre Punkte im Verlauf bleiben erhalten.')) return;
    state.members = state.members.filter(m => m.id !== id);
    if (me === id) { me = null; localStorage.removeItem(LS_ME); }
    changedMembers.delete(id);
    save(); renderMemberRows();
    push(() => sb('members?id=eq.' + id, 'DELETE'));
  });
  document.getElementById('addMember').addEventListener('click', () => {
    const m = { id: uid(), name: '', color: palette[state.members.length % palette.length] };
    state.members.push(m); changedMembers.add(m.id);
    save(); renderMemberRows();
    const inputs = document.querySelectorAll('#memberRows input[type=text]');
    inputs[inputs.length - 1].focus();
  });
  document.getElementById('closeMembers').addEventListener('click', () => {
    state.members = state.members.filter(m => m.name.trim() !== '');
    if (!state.members.length) state.members = [{ id: uid(), name: 'Ich', color: palette[0] }];
    save(); memberSheet.close(); render();
    // geänderte/neue Personen synchronisieren (upsert)
    const ms = state.members.filter(m => changedMembers.has(m.id));
    if (ms.length) push(() => fetch(cfg.url.replace(/\/+$/, '') + '/rest/v1/members', {
      method: 'POST',
      headers: { apikey: cfg.key, Authorization: 'Bearer ' + cfg.key,
        'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify(ms)
    }).then(r => { if (!r.ok) throw new Error(r.status); }));
  });

  // ---------- Sync-Sheet ----------
  const syncSheet = document.getElementById('syncSheet');
  document.getElementById('openSync').addEventListener('click', () => {
    const pre = cfg || DEFAULT_SYNC || { url: '', key: '' };
    document.getElementById('sUrl').value = pre.url;
    document.getElementById('sKey').value = pre.key;
    document.getElementById('syncStatus').innerHTML = (cfg
      ? (syncOk === false ? 'Verbunden, aber letzter Abgleich fehlgeschlagen.' : 'Verbunden.')
      : 'Nicht verbunden – Daten bleiben nur auf diesem Gerät.')
      + ' <button id="resetSync" style="border:none;background:none;color:var(--spruce);font-weight:600;cursor:pointer;padding:0">Auf Standard zurücksetzen</button>'
      + `<div style="margin-top:6px;color:var(--muted)">App-Version ${APP_VERSION}</div>`;
    document.getElementById('resetSync').onclick = () => {
      localStorage.removeItem(LS_CFG);
      cfg = DEFAULT_SYNC; syncOk = null;
      syncSheet.close(); render(); pull();
    };
    syncSheet.showModal();
  });
  document.getElementById('saveSync').addEventListener('click', async () => {
    const url = document.getElementById('sUrl').value.trim();
    const key = document.getElementById('sKey').value.trim();
    if (!url || !key) { document.getElementById('syncStatus').textContent = 'Bitte URL und Key eintragen.'; return; }
    cfg = { url, key };
    document.getElementById('syncStatus').textContent = 'Teste Verbindung …';
    try {
      const remoteMembers = await sb('members?select=id&limit=1');
      localStorage.setItem(LS_CFG, JSON.stringify(cfg));
      // Erstes Gerät: lokale Daten hochladen, sonst nur übernehmen
      if (!remoteMembers.length) {
        await sb('members', 'POST', state.members);
        if (state.chores.length) await sb('chores', 'POST', state.chores);
        if (state.log.length) await sb('log', 'POST', state.log);
      }
      await pull();
      document.getElementById('syncStatus').textContent = 'Verbunden ✓';
      setTimeout(() => syncSheet.close(), 600);
    } catch (e) {
      cfg = null; syncOk = null;
      document.getElementById('syncStatus').textContent = 'Verbindung fehlgeschlagen – URL/Key prüfen (und ob die Tabellen existieren).';
      renderSyncDot();
    }
  });
  document.getElementById('disconnectSync').addEventListener('click', () => {
    cfg = null; syncOk = null; localStorage.setItem(LS_CFG, '{"off":true}');
    syncSheet.close(); render();
  });

  // ---------- Start ----------
  if ('serviceWorker' in navigator) {
    let hadController = !!navigator.serviceWorker.controller;
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      // Neue Version hat übernommen → einmal neu laden (nicht bei Erstinstallation)
      if (hadController && !reloaded) { reloaded = true; location.reload(); }
      hadController = true;
    });
    navigator.serviceWorker.register('sw.js')
      .then(reg => {
        document.addEventListener('visibilitychange', () => { if (!document.hidden) reg.update(); });
      })
      .catch(() => {});
  }
  document.addEventListener('visibilitychange', () => { if (!document.hidden && !firstRunOpen) { invalidateOrder(); pull(); } });
  setInterval(() => { if (!document.hidden && cfg && !firstRunOpen) pull(); }, 20000); // Auto-Sync alle 20 s
  render();
  // Brandneue Familie ohne lokalen Stand: Einrichtung sofort zeigen, nicht
  // erst nach dem ersten Netzwerk-Pull.
  if (!USER_SLUG && !state.members.length && !state.famName) firstRunSetup();
  pull();
})();
</script>
</body>
</html>
