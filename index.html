<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Haushalt</title>
<meta name="description" content="Aufgaben im Haushalt – wer macht was, und wann.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2F6B4F">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1F3EF;          /* kühles, salbei-getöntes Weiss */
    --card:#FFFFFF;
    --ink:#21302A;          /* tiefes Grünschwarz */
    --muted:#6B7A72;
    --line:#DDE3DC;
    --spruce:#2F6B4F;       /* Primäraktion */
    --spruce-press:#27593F;
    --due:#B8860B;          /* fällig heute */
    --over:#B23A2E;         /* überfällig */
    --done:#9AA8A0;
    --radius:14px;
    --shadow:0 1px 2px rgba(33,48,42,.06), 0 4px 14px rgba(33,48,42,.06);
    --display:'Bricolage Grotesque', system-ui, sans-serif;
    --body:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--body);
    font-size:16px; line-height:1.45; min-height:100dvh;
    padding-bottom:calc(96px + env(safe-area-inset-bottom));
  }
  header{
    padding:calc(16px + env(safe-area-inset-top)) 18px 4px;
  }
  header h1{
    font-family:var(--display); font-weight:800; font-size:30px;
    letter-spacing:-.02em; margin:0;
  }
  header .date{color:var(--muted); font-size:14px; margin-top:2px}

  /* Tabs */
  .tabs{display:flex; gap:6px; padding:12px 18px 6px; position:sticky; top:0; background:linear-gradient(var(--bg) 80%, transparent); z-index:5}
  .tab{
    border:1px solid var(--line); background:var(--card); color:var(--muted);
    border-radius:999px; padding:8px 16px; font-size:15px; font-weight:600;
    font-family:var(--body); cursor:pointer;
  }
  .tab[aria-selected="true"]{background:var(--ink); border-color:var(--ink); color:#fff}
  .tab:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible{
    outline:2px solid var(--spruce); outline-offset:2px;
  }

  /* Member filter row */
  .members{display:flex; gap:8px; overflow-x:auto; padding:8px 18px 4px; scrollbar-width:none}
  .members::-webkit-scrollbar{display:none}
  .chip{
    display:flex; align-items:center; gap:7px; flex:0 0 auto;
    border:1px solid var(--line); background:var(--card); border-radius:999px;
    padding:6px 13px 6px 8px; font-size:14px; font-weight:600; color:var(--ink); cursor:pointer;
  }
  .chip .dot{width:18px; height:18px; border-radius:50%; display:grid; place-items:center; color:#fff; font-size:11px; font-weight:700}
  .chip[aria-pressed="true"]{border-color:var(--ink); box-shadow:inset 0 0 0 1px var(--ink)}

  /* Task list */
  main{padding:10px 14px 0}
  .group-label{
    font-family:var(--display); font-weight:700; font-size:14px; letter-spacing:.06em;
    text-transform:uppercase; color:var(--muted); margin:18px 6px 8px;
  }
  .task{
    display:flex; align-items:center; gap:12px;
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:13px 14px; margin-bottom:8px; box-shadow:var(--shadow);
  }
  .check{
    width:28px; height:28px; flex:0 0 28px; border-radius:50%;
    border:2px solid var(--line); background:transparent; cursor:pointer;
    display:grid; place-items:center; transition:transform .12s ease, background .15s ease, border-color .15s ease;
  }
  .check:active{transform:scale(.85)}
  .check svg{opacity:0; transition:opacity .15s}
  .task.done .check{background:var(--spruce); border-color:var(--spruce)}
  .task.done .check svg{opacity:1}
  .task .body{flex:1; min-width:0}
  .task .title{font-weight:600; overflow-wrap:break-word}
  .task.done .title{color:var(--done); text-decoration:line-through}
  .task .meta{display:flex; flex-wrap:wrap; gap:6px 10px; font-size:13px; color:var(--muted); margin-top:2px; align-items:center}
  .badge{font-weight:600}
  .badge.today{color:var(--due)}
  .badge.over{color:var(--over)}
  .who{display:inline-flex; align-items:center; gap:5px}
  .who .dot{width:12px; height:12px; border-radius:50%}
  .task .del{
    border:none; background:none; color:var(--muted); font-size:20px; line-height:1;
    padding:6px; cursor:pointer; border-radius:8px;
  }
  .empty{
    text-align:center; color:var(--muted); padding:48px 24px;
  }
  .empty b{display:block; font-family:var(--display); font-weight:700; font-size:18px; color:var(--ink); margin-bottom:4px}

  /* FAB */
  .fab{
    position:fixed; right:18px; bottom:calc(20px + env(safe-area-inset-bottom));
    width:60px; height:60px; border-radius:50%; border:none; cursor:pointer;
    background:var(--spruce); color:#fff; font-size:30px; line-height:1;
    box-shadow:0 6px 18px rgba(47,107,79,.4); z-index:20;
    transition:transform .1s ease, background .15s ease;
  }
  .fab:active{transform:scale(.92); background:var(--spruce-press)}

  /* Sheet / dialog */
  dialog{
    border:none; border-radius:20px 20px 0 0; padding:0; width:100%; max-width:560px;
    margin:auto auto 0; background:var(--card);
  }
  dialog::backdrop{background:rgba(33,48,42,.35)}
  .sheet{padding:20px 20px calc(20px + env(safe-area-inset-bottom))}
  .sheet h2{font-family:var(--display); font-weight:700; font-size:20px; margin:0 0 14px}
  .field{margin-bottom:14px}
  .field label{display:block; font-size:13px; font-weight:600; color:var(--muted); margin-bottom:5px}
  .field input[type=text], .field input[type=date], .field select{
    width:100%; padding:11px 12px; font-size:16px; font-family:var(--body);
    border:1px solid var(--line); border-radius:10px; background:var(--bg); color:var(--ink);
  }
  .row{display:flex; gap:10px}
  .row .field{flex:1}
  .seg{display:flex; gap:6px; flex-wrap:wrap}
  .seg button{
    border:1px solid var(--line); background:var(--bg); border-radius:999px;
    padding:7px 13px; font-size:14px; font-weight:600; color:var(--ink); cursor:pointer;
  }
  .seg button[aria-pressed="true"]{background:var(--ink); border-color:var(--ink); color:#fff}
  .actions{display:flex; gap:10px; margin-top:18px}
  .btn{
    flex:1; padding:13px; border-radius:12px; font-size:16px; font-weight:700;
    font-family:var(--body); cursor:pointer; border:1px solid var(--line); background:var(--bg); color:var(--ink);
  }
  .btn.primary{background:var(--spruce); border-color:var(--spruce); color:#fff}
  .btn.primary:active{background:var(--spruce-press)}

  /* Member editor */
  .mrow{display:flex; gap:8px; align-items:center; margin-bottom:8px}
  .mrow input[type=text]{flex:1; padding:10px 12px; font-size:16px; border:1px solid var(--line); border-radius:10px; background:var(--bg); color:var(--ink)}
  .mrow input[type=color]{width:42px; height:42px; border:none; background:none; padding:0; cursor:pointer}
  .mrow .del{border:none; background:none; font-size:20px; color:var(--muted); cursor:pointer; padding:6px}
  .addmember{border:1px dashed var(--line); background:none; width:100%; padding:11px; border-radius:10px; color:var(--muted); font-weight:600; cursor:pointer; font-size:15px}

  .settings-link{
    position:absolute; top:calc(18px + env(safe-area-inset-top)); right:18px;
    border:1px solid var(--line); background:var(--card); border-radius:999px;
    padding:7px 14px; font-size:14px; font-weight:600; color:var(--ink); cursor:pointer;
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important; animation:none !important}
  }
</style>
</head>
<body>
<header>
  <h1>Haushalt</h1>
  <div class="date" id="todayLabel"></div>
  <button class="settings-link" id="openMembers">Personen</button>
</header>

<div class="tabs" role="tablist">
  <button class="tab" role="tab" data-view="today" aria-selected="true">Heute</button>
  <button class="tab" role="tab" data-view="all" aria-selected="false">Alle</button>
  <button class="tab" role="tab" data-view="done" aria-selected="false">Erledigt</button>
</div>
<div class="members" id="memberFilter"></div>

<main id="list"></main>

<button class="fab" id="openAdd" aria-label="Aufgabe hinzufügen">+</button>

<dialog id="addSheet">
  <form class="sheet" method="dialog" id="addForm">
    <h2 id="sheetTitle">Neue Aufgabe</h2>
    <div class="field">
      <label for="fTitle">Was ist zu tun?</label>
      <input type="text" id="fTitle" placeholder="z. B. Altglas wegbringen" required maxlength="120" autocomplete="off">
    </div>
    <div class="field">
      <label>Wer ist dran?</label>
      <div class="seg" id="fWho"></div>
    </div>
    <div class="row">
      <div class="field">
        <label for="fDue">Fällig am</label>
        <input type="date" id="fDue">
      </div>
      <div class="field">
        <label for="fRepeat">Wiederholen</label>
        <select id="fRepeat">
          <option value="none">Nie</option>
          <option value="daily">Täglich</option>
          <option value="weekly">Wöchentlich</option>
          <option value="biweekly">Alle 2 Wochen</option>
          <option value="monthly">Monatlich</option>
        </select>
      </div>
    </div>
    <div class="actions">
      <button type="button" class="btn" id="cancelAdd">Abbrechen</button>
      <button type="submit" class="btn primary" id="saveAdd">Speichern</button>
    </div>
  </form>
</dialog>

<dialog id="memberSheet">
  <div class="sheet">
    <h2>Personen im Haushalt</h2>
    <div id="memberRows"></div>
    <button class="addmember" id="addMember">+ Person hinzufügen</button>
    <div class="actions">
      <button type="button" class="btn primary" id="closeMembers">Fertig</button>
    </div>
  </div>
</dialog>

<script>
(() => {
  const LS_KEY = 'haushalt.v1';
  const todayISO = () => new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD, lokale Zeit
  const uid = () => Math.random().toString(36).slice(2, 10);

  const defaultState = {
    members: [
      { id: uid(), name: 'Chris', color: '#2F6B4F' },
      { id: uid(), name: 'Partnerin', color: '#B8860B' }
    ],
    tasks: [],
    filterMember: null,
    view: 'today'
  };

  let state;
  try { state = JSON.parse(localStorage.getItem(LS_KEY)) || defaultState; }
  catch { state = defaultState; }
  const save = () => localStorage.setItem(LS_KEY, JSON.stringify(state));

  // ---------- Helpers ----------
  const fmtDate = iso => {
    if (!iso) return '';
    const d = new Date(iso + 'T00:00');
    return d.toLocaleDateString('de-CH', { weekday: 'short', day: 'numeric', month: 'short' });
  };
  const advance = (iso, repeat) => {
    const d = new Date(iso + 'T00:00');
    if (repeat === 'daily') d.setDate(d.getDate() + 1);
    else if (repeat === 'weekly') d.setDate(d.getDate() + 7);
    else if (repeat === 'biweekly') d.setDate(d.getDate() + 14);
    else if (repeat === 'monthly') d.setMonth(d.getMonth() + 1);
    return d.toLocaleDateString('sv-SE');
  };
  const repeatLabel = r => ({ daily:'täglich', weekly:'wöchentlich', biweekly:'alle 2 Wochen', monthly:'monatlich' }[r] || '');
  const memberById = id => state.members.find(m => m.id === id);
  const initial = name => (name || '?').trim().charAt(0).toUpperCase();

  // ---------- Rendering ----------
  const listEl = document.getElementById('list');

  function taskRow(t) {
    const m = memberById(t.assignee);
    const today = todayISO();
    let badge = '';
    if (!t.done && t.due) {
      if (t.due < today) badge = `<span class="badge over">überfällig · ${fmtDate(t.due)}</span>`;
      else if (t.due === today) badge = `<span class="badge today">heute</span>`;
      else badge = `<span class="badge">${fmtDate(t.due)}</span>`;
    }
    const who = m ? `<span class="who"><span class="dot" style="background:${m.color}"></span>${m.name}</span>` : '';
    const rep = t.repeat !== 'none' ? `<span>↻ ${repeatLabel(t.repeat)}</span>` : '';
    return `<div class="task ${t.done ? 'done' : ''}" data-id="${t.id}">
      <button class="check" aria-label="${t.done ? 'Als offen markieren' : 'Als erledigt markieren'}">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2.5 8.5l3.5 3.5L13.5 4" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="body">
        <div class="title"></div>
        <div class="meta">${who}${badge}${rep}</div>
      </div>
      <button class="del" aria-label="Aufgabe löschen">×</button>
    </div>`;
  }

  function render() {
    document.getElementById('todayLabel').textContent =
      new Date().toLocaleDateString('de-CH', { weekday: 'long', day: 'numeric', month: 'long' });

    // tabs
    document.querySelectorAll('.tab').forEach(b =>
      b.setAttribute('aria-selected', String(b.dataset.view === state.view)));

    // member filter chips
    const mf = document.getElementById('memberFilter');
    mf.innerHTML = state.members.map(m =>
      `<button class="chip" data-mid="${m.id}" aria-pressed="${state.filterMember === m.id}">
        <span class="dot" style="background:${m.color}">${initial(m.name)}</span><span class="cname"></span>
      </button>`).join('');
    mf.querySelectorAll('.chip').forEach((c, i) => c.querySelector('.cname').textContent = state.members[i].name);

    // tasks
    const today = todayISO();
    let tasks = state.tasks.slice();
    if (state.filterMember) tasks = tasks.filter(t => t.assignee === state.filterMember);

    let html = '';
    if (state.view === 'today') {
      const open = tasks.filter(t => !t.done && t.due && t.due <= today)
        .sort((a, b) => a.due.localeCompare(b.due));
      const noDate = tasks.filter(t => !t.done && !t.due);
      if (open.length) html += `<div class="group-label">Fällig</div>` + open.map(taskRow).join('');
      if (noDate.length) html += `<div class="group-label">Ohne Termin</div>` + noDate.map(taskRow).join('');
      if (!html) html = `<div class="empty"><b>Alles erledigt</b>Für heute steht nichts mehr an.</div>`;
    } else if (state.view === 'all') {
      const open = tasks.filter(t => !t.done)
        .sort((a, b) => (a.due || '9999').localeCompare(b.due || '9999'));
      html = open.length ? open.map(taskRow).join('')
        : `<div class="empty"><b>Noch keine Aufgaben</b>Tippe auf +, um die erste anzulegen.</div>`;
    } else {
      const done = tasks.filter(t => t.done)
        .sort((a, b) => (b.doneAt || '').localeCompare(a.doneAt || ''));
      html = done.length ? done.map(taskRow).join('')
        : `<div class="empty"><b>Noch nichts erledigt</b>Abgehakte Aufgaben landen hier.</div>`;
    }
    listEl.innerHTML = html;

    // titles as textContent (kein HTML-Injection-Risiko)
    listEl.querySelectorAll('.task').forEach(el => {
      const t = state.tasks.find(x => x.id === el.dataset.id);
      if (t) el.querySelector('.title').textContent = t.title;
    });
  }

  // ---------- Events ----------
  document.querySelector('.tabs').addEventListener('click', e => {
    const b = e.target.closest('.tab'); if (!b) return;
    state.view = b.dataset.view; save(); render();
  });

  document.getElementById('memberFilter').addEventListener('click', e => {
    const c = e.target.closest('.chip'); if (!c) return;
    state.filterMember = state.filterMember === c.dataset.mid ? null : c.dataset.mid;
    save(); render();
  });

  listEl.addEventListener('click', e => {
    const row = e.target.closest('.task'); if (!row) return;
    const t = state.tasks.find(x => x.id === row.dataset.id); if (!t) return;

    if (e.target.closest('.check')) {
      if (!t.done && t.repeat !== 'none' && t.due) {
        // Wiederholende Aufgabe: Erledigung protokollieren, nächsten Termin setzen
        state.tasks.push({ ...t, id: uid(), done: true, doneAt: new Date().toISOString(), repeat: 'none' });
        t.due = advance(t.due, t.repeat);
      } else {
        t.done = !t.done;
        t.doneAt = t.done ? new Date().toISOString() : null;
      }
      save(); render();
    } else if (e.target.closest('.del')) {
      if (confirm(`„${t.title}“ löschen?`)) {
        state.tasks = state.tasks.filter(x => x.id !== t.id);
        save(); render();
      }
    }
  });

  // ---------- Add sheet ----------
  const addSheet = document.getElementById('addSheet');
  let pickedWho = null;

  function renderWhoSeg() {
    const seg = document.getElementById('fWho');
    seg.innerHTML = state.members.map(m =>
      `<button type="button" data-mid="${m.id}" aria-pressed="${pickedWho === m.id}"></button>`).join('');
    seg.querySelectorAll('button').forEach((b, i) => b.textContent = state.members[i].name);
  }

  document.getElementById('openAdd').addEventListener('click', () => {
    pickedWho = state.filterMember || (state.members[0] && state.members[0].id) || null;
    document.getElementById('fTitle').value = '';
    document.getElementById('fDue').value = todayISO();
    document.getElementById('fRepeat').value = 'none';
    renderWhoSeg();
    addSheet.showModal();
  });
  document.getElementById('fWho').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    pickedWho = b.dataset.mid; renderWhoSeg();
  });
  document.getElementById('cancelAdd').addEventListener('click', () => addSheet.close());
  document.getElementById('addForm').addEventListener('submit', () => {
    const title = document.getElementById('fTitle').value.trim();
    if (!title) return;
    state.tasks.push({
      id: uid(), title, assignee: pickedWho,
      due: document.getElementById('fDue').value || null,
      repeat: document.getElementById('fRepeat').value,
      done: false, doneAt: null
    });
    save(); render();
  });

  // ---------- Member sheet ----------
  const memberSheet = document.getElementById('memberSheet');
  const palette = ['#2F6B4F', '#B8860B', '#3A6EA5', '#B23A2E', '#7A4FA0', '#3E8E7E'];

  function renderMemberRows() {
    const wrap = document.getElementById('memberRows');
    wrap.innerHTML = state.members.map(m =>
      `<div class="mrow" data-mid="${m.id}">
        <input type="color" value="${m.color}" aria-label="Farbe">
        <input type="text" value="" maxlength="30" aria-label="Name">
        <button class="del" aria-label="Person entfernen">×</button>
      </div>`).join('');
    wrap.querySelectorAll('.mrow').forEach((r, i) => r.querySelector('input[type=text]').value = state.members[i].name);
  }
  document.getElementById('openMembers').addEventListener('click', () => {
    renderMemberRows(); memberSheet.showModal();
  });
  document.getElementById('memberRows').addEventListener('input', e => {
    const row = e.target.closest('.mrow'); if (!row) return;
    const m = memberById(row.dataset.mid); if (!m) return;
    if (e.target.type === 'text') m.name = e.target.value;
    if (e.target.type === 'color') m.color = e.target.value;
    save();
  });
  document.getElementById('memberRows').addEventListener('click', e => {
    if (!e.target.closest('.del')) return;
    const row = e.target.closest('.mrow');
    if (state.members.length <= 1) { alert('Mindestens eine Person wird benötigt.'); return; }
    state.members = state.members.filter(m => m.id !== row.dataset.mid);
    if (state.filterMember && !memberById(state.filterMember)) state.filterMember = null;
    save(); renderMemberRows();
  });
  document.getElementById('addMember').addEventListener('click', () => {
    state.members.push({ id: uid(), name: '', color: palette[state.members.length % palette.length] });
    save(); renderMemberRows();
    const inputs = document.querySelectorAll('#memberRows input[type=text]');
    inputs[inputs.length - 1].focus();
  });
  document.getElementById('closeMembers').addEventListener('click', () => {
    state.members = state.members.filter(m => m.name.trim() !== '');
    if (!state.members.length) state.members = [{ id: uid(), name: 'Ich', color: palette[0] }];
    save(); memberSheet.close(); render();
  });

  // ---------- Service Worker ----------
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  render();
})();
</script>
</body>
</html>
