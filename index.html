<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>Fairli</title>
<meta name="description" content="Fairli – wer macht was im Haushalt, und wer sammelt die Punkte.">
<script>
  // Synchron VOR dem Rendern: persönlicher Link? Dann Admin-Buttons sofort
  // ausblenden (kein Aufblitzen von Teilen/Personen/Sync).
  (function(){
    document.documentElement.classList.add('booting');
    document.documentElement.classList.add('splash');
    var s = location.pathname + location.search + location.hash;
    var isUser = /\/u\/[a-z0-9]{4,}/i.test(s);
    if (!isUser) {
      try {
        // Spiegel der Restore-Logik: Familien-Route hat Vorrang
        var fam = JSON.parse(localStorage.getItem('haushalt.route.family'));
        if (!fam) {
          var r = JSON.parse(localStorage.getItem('haushalt.route.user')) ||
                  JSON.parse(localStorage.getItem('haushalt.route'));
          if (r && r.userSlug) isUser = true;
        }
      } catch (e) {}
    }
    if (isUser) document.documentElement.classList.add('userlink');
  })();
</script>
<style>
  html.userlink #openMembers { display:none !important; }
</style>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Fairli">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#141A17">
<link rel="apple-touch-icon" href="/chores/icon-192.png?v=47">
<link rel="icon" href="/chores/icon-192.png?v=47" sizes="192x192" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12161F; --card:#1A2230; --ink:#EAF1EB; --muted:#91A1B8;
    --line:#2A3447; --accent:#84B2FF; --accent-press:#6B99E6;
    --gold:#E8B931; --red:#E8746A;
    --radius:14px;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.25);
    --display:'Bricolage Grotesque', system-ui, sans-serif;
    --body:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--body);
    font-size:17px; line-height:1.45; min-height:100dvh;
    padding-bottom:calc(100px + env(safe-area-inset-bottom));
  }
  header{padding:calc(16px + env(safe-area-inset-top)) 18px 4px;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .hrow{display:flex; align-items:center; gap:10px; flex:1; min-width:0}
  #apphead.wide .hrow{flex:1 0 100%}
  #apphead.wide .headbtns{margin-left:auto}
  :root{--titlefs:clamp(30px, 9.2vw, 38px)}
  header h1{font-family:var(--display); font-weight:800; letter-spacing:-.02em; margin:0;
    font-size:var(--titlefs);
    background:linear-gradient(100deg, #EAF1EB, var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent;
    flex:1 1 auto; min-width:0; overflow-wrap:anywhere; line-height:1.1;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .headbtns{display:flex; gap:6px; flex:0 0 auto; justify-content:flex-end; align-items:center; padding-top:2px}
  .iconbtn{border:1px solid var(--line); background:var(--card); border-radius:999px;
    padding:7px 13px; font-size:14px; font-weight:600; color:var(--ink); cursor:pointer}
  .syncdot{display:inline-block; width:8px; height:8px; border-radius:50%; background:#445248; margin-right:5px; vertical-align:1px}
  .syncdot.on{background:var(--accent)} .syncdot.err{background:var(--red)}

  .iam{display:flex; flex-wrap:wrap; gap:8px; row-gap:6px; align-items:center; padding:10px 18px 2px; scrollbar-width:none;
    min-height:46px}
  .iam.multi{justify-content:center}
  html.booting .iam{visibility:hidden}
  .iam::-webkit-scrollbar{display:none}
  .iam .lbl{font-size:13px; font-weight:700; color:var(--muted); flex:0 0 auto; text-transform:uppercase; letter-spacing:.05em}
  .chip{display:flex; align-items:center; gap:7px; flex:0 0 auto;
    border:1px solid var(--line); background:var(--card); border-radius:999px;
    padding:6px 13px 6px 8px; font-size:15px; font-weight:600; color:var(--ink); cursor:pointer}
  .chip .dot{width:18px; height:18px; border-radius:50%; display:grid; place-items:center; color:#10140F; font-size:11px; font-weight:800}
  .chip[aria-pressed="true"]{border-color:var(--accent); box-shadow:inset 0 0 0 1.5px var(--accent)}

  .tabs{display:flex; gap:6px; padding:12px 18px 10px; position:sticky; top:0;
    background:var(--bg); z-index:5}
  /* Weicher Auslauf UNTER der Leiste: Kacheln blenden aus, statt in die
     Pills zu laufen (Live-Feedback 17.07.) */
  .tabs::after{content:''; position:absolute; left:0; right:0; top:100%; height:14px;
    background:linear-gradient(var(--bg), transparent); pointer-events:none}
  .tab{border:1px solid var(--line); background:var(--card); color:var(--muted);
    border-radius:999px; padding:9px 18px; font-size:16px; font-weight:600; cursor:pointer; font-family:var(--body)}
  .tab[aria-selected="true"]{background:var(--accent); border-color:var(--accent); color:#10140F}
  .tab:focus-visible, button:focus-visible, input:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

  main{padding:10px 14px 0}

  /* Chore-Tasten: Masonry, Grösse nach Punktwert, Reihenfolge nach Nutzung */
  .grid{columns:2; column-gap:12px}
  .chore{
    position:relative; overflow:hidden; text-align:left; cursor:pointer;
    width:100%; margin-bottom:12px; break-inside:avoid;
    font-family:var(--body); color:var(--ink); min-height:104px;
    background:linear-gradient(168deg,
      color-mix(in srgb, var(--c) 30%, var(--card)),
      color-mix(in srgb, var(--c) 10%, var(--card)));
    border:1px solid color-mix(in srgb, var(--c) 45%, var(--card));
    border-radius:18px;
    box-shadow:0 12px 20px rgba(0,0,0,.35);
    padding:18px 16px 15px;
    display:flex; flex-direction:column; justify-content:space-between; gap:10px;
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .chore:active{transform:translateY(2px);
    box-shadow:0 4px 8px rgba(0,0,0,.3)}
  .chore .art{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    opacity:.55; z-index:0; pointer-events:none}
  .chore::after{content:''; position:absolute; inset:0; z-index:1; pointer-events:none;
    background:linear-gradient(180deg, rgba(10,14,12,.6), rgba(10,14,12,.12) 55%, rgba(10,14,12,.55))}
  .chore .cname{font-weight:700; font-size:18px; line-height:1.25; overflow-wrap:break-word; padding-right:24px; position:relative; color:#fff; z-index:2; text-shadow:0 1px 4px rgba(0,0,0,.6)}
  .chore .cnote{font-weight:500; font-size:12px; line-height:1.2; margin-top:2px; padding-right:24px;
    position:relative; z-index:2; color:rgba(255,255,255,.82); text-shadow:0 1px 3px rgba(0,0,0,.7);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .chore .pts{align-self:flex-start; position:relative; z-index:2;
    font-family:var(--display); font-weight:800; font-size:20px;
    color:color-mix(in srgb, var(--c) 65%, #fff);
    background:color-mix(in srgb, var(--c) 28%, transparent);
    border-radius:999px; padding:4px 15px}
  .chore .edit{position:absolute; top:0; right:0; width:52px; height:52px;
    display:flex; align-items:center; justify-content:center; border:none;
    background:none; color:rgba(255,255,255,.75); font-size:17px; cursor:pointer;
    border-radius:0 14px 0 14px; z-index:2}
  .chore .edit:active{background:rgba(255,255,255,.12)}
  .chore.flash{animation:flash .5s ease}
  @keyframes flash{0%{filter:brightness(1.4) saturate(1.4)} 100%{filter:none}}

  .score{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:14px; margin-bottom:8px}
  .score .top{display:flex; align-items:center; gap:11px}
  .score .dot{width:32px; height:32px; border-radius:50%; display:grid; place-items:center; color:#10140F; font-weight:800; font-size:15px; flex:0 0 32px}
  .score .name{font-weight:700; font-size:18px; flex:1}
  .score .num{font-family:var(--display); font-weight:800; font-size:34px}
  .score .bar{height:10px; border-radius:999px; background:#252F29; margin-top:10px; overflow:hidden}
  .score .bar i{display:block; height:100%; border-radius:999px}
  .score .sub{font-size:14px; color:var(--muted); margin-top:6px}
  .period{display:flex; gap:6px; margin:4px 4px 12px}
  .period button{border:1px solid var(--line); background:var(--card); border-radius:999px;
    padding:6px 14px; font-size:14px; font-weight:600; color:var(--muted); cursor:pointer}
  .period button[aria-pressed="true"]{background:var(--accent); color:#10140F; border-color:var(--accent)}

  .entry{display:flex; align-items:center; gap:10px; background:var(--card);
    border:1px solid var(--line); border-radius:var(--radius); padding:11px 13px; margin-bottom:8px}
  .entry .dot{width:14px; height:14px; border-radius:50%; flex:0 0 14px}
  .entry .what{flex:1; min-width:0}
  .entry .what b{font-weight:700}
  .entry .when{font-size:12.5px; color:var(--muted)}
  .entry .pts{font-family:var(--display); font-weight:800; font-size:19px; color:var(--accent)}
  .entry .undo{border:none; background:none; color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; padding:6px}
  .entry .enote{font-size:12.5px; color:var(--muted); margin:1px 0}
  .entmenu{position:relative}
  .kebab{border:none; background:none; color:var(--muted); font-size:20px; line-height:1; cursor:pointer; padding:6px 8px; border-radius:8px}
  .kebab:active{background:rgba(255,255,255,.08)}
  .menupop{position:absolute; right:0; top:100%; margin-top:6px; background:var(--card); border:1px solid var(--line);
    border-radius:14px; box-shadow:0 8px 24px rgba(0,0,0,.4); z-index:5; overflow:hidden; min-width:216px; padding:6px}
  .menuitem{display:block; width:100%; text-align:left; border:none; background:none; color:var(--ink);
    font-size:16px; font-weight:600; padding:15px 16px; min-height:52px; border-radius:9px; cursor:pointer}
  .setrow{display:flex;align-items:center;gap:12px;min-height:54px}
  .setrow .seticon{font-size:19px;width:26px;text-align:center;flex:none}
  .setrow .setlabel{flex:1;text-align:left}
  .setrow .setval{color:var(--muted);font-size:14px;max-width:44%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:none}
  .setrow .chev{color:var(--muted);font-size:19px;flex:none;margin-left:-2px}
  .setrow:disabled{opacity:.55}
  /* Boot-Splash (v4.39.0): Icon startet vollflaechig und morpht in die
     Kopf-Ecke. pointer-events:none — rein visuell, blockiert NIE Bedienung. */
  #splash{position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
    background:var(--bg); pointer-events:none; transition:background .45s ease}
  #splash img{width:104px; height:104px; border-radius:24px; transform-origin:top left;
    transition:transform .45s cubic-bezier(.2,.7,.2,1)}
  /* Logo folgt der Titelgroesse (Wunsch 17.07.: «so gross wie das R») —
     die Kunst hat inneren Rand, darum Box = volle Schriftgroesse. */
  #headLogo{width:var(--titlefs); height:var(--titlefs);
    border-radius:23%; margin-right:10px; flex:none; align-self:center}
  html.splash #headLogo{opacity:0}
  /* KEIN Kopf-Schrumpfen mehr (v4.42.0): der Kopf scrollt normal aus dem
     Bild, nur die Tabs kleben. Das Scroll-Schrumpfen (binaer, dann
     interpoliert) brachte wenige Pixel und viele Probleme — mehrzeilige
     Titel klappten beim Kleinerwerden einzeilig um (Live-Feedback 17.07.). */
  .dayhead{font-weight:800;font-size:13.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin:18px 4px 8px}
  img.art{opacity:0;transition:opacity .35s ease}
  @media (prefers-reduced-motion: reduce){ img.art{transition:none} .chore::after{animation:none !important} }
  img.art.ok{opacity:1}
  @keyframes shim{0%{background-position:-200% 0}100%{background-position:200% 0}}
  .chore:has(img.art:not(.ok))::after{content:'';position:absolute;inset:0;border-radius:inherit;
    background:linear-gradient(100deg,transparent 30%,rgba(255,255,255,.055) 50%,transparent 70%);
    background-size:200% 100%;animation:shim 1.3s linear infinite;pointer-events:none}
  dialog input[type="datetime-local"]{width:100%;box-sizing:border-box;padding:12px;font-size:16px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);color-scheme:dark;font-family:inherit}

  .menuitem:active{background:rgba(255,255,255,.10)}
  /* Destruktives sitzt separat: eigene Zeile, Abstand, damit es nicht
     versehentlich getroffen wird (Verlauf-Fehltipp, Maintainer 14.07.) */
  .menuitem.danger{color:var(--red); margin-top:6px; box-shadow:inset 0 1px 0 var(--line)}
  .dellink{display:block; margin:16px auto 0; border:none; background:none; color:var(--muted);
    font-size:14px; cursor:pointer; padding:8px; text-decoration:underline}

  .empty{text-align:center; color:var(--muted); padding:48px 24px}
  .empty b{display:block; font-family:var(--display); font-weight:700; font-size:18px; color:var(--ink); margin-bottom:4px}

  .fab{position:fixed; right:18px; bottom:calc(20px + env(safe-area-inset-bottom));
    width:64px; height:64px; border-radius:50%; border:none; cursor:pointer;
    background:var(--accent); color:#10140F; font-size:30px; line-height:1;
    box-shadow:0 6px 18px rgba(82,192,138,.35); z-index:20; transition:transform .1s ease}
  .fab:active{transform:scale(.92); background:var(--accent-press)}

  dialog{border:none; border-radius:20px 20px 0 0; padding:0; width:100%; max-width:560px;
    margin:auto auto 0; background:var(--card); color:var(--ink)}
  dialog::backdrop{background:rgba(0,0,0,.55)}
  /* Sheets GLEITEN von unten herein statt aufzupoppen (v4.42.1); die globale
     reduced-motion-Regel (unten) schaltet das automatisch ab */
  dialog[open]{animation:sheetIn .28s cubic-bezier(.2,.75,.25,1)}
  dialog[open]::backdrop{animation:backdropIn .28s ease}
  @keyframes sheetIn{from{transform:translateY(100%)}}
  @keyframes backdropIn{from{background:rgba(0,0,0,0)}}
  .sheet{padding:20px 20px calc(20px + env(safe-area-inset-bottom));max-height:calc(100vh - 24px);max-height:calc(100dvh - 24px);overflow-y:auto;overscroll-behavior:contain}
  .sheet h2{font-family:var(--display); font-weight:700; font-size:20px; margin:0 0 14px}
  .field{margin-bottom:14px}
  .field label{display:block; font-size:13px; font-weight:600; color:var(--muted); margin-bottom:5px}
  .field input[type=text], .field input[type=number], .field input[type=url], .field input[type=password]{
    width:100%; padding:11px 12px; font-size:16px; font-family:var(--body);
    border:1px solid var(--line); border-radius:10px; background:#161D19; color:var(--ink)}
  .actions{display:flex; gap:10px; margin-top:18px}
  .btn{flex:1; padding:13px; border-radius:12px; font-size:16px; font-weight:700; font-family:var(--body);
    cursor:pointer; border:1px solid var(--line); background:#161D19; color:var(--ink)}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#10140F}
  .btn.primary:active{background:var(--accent-press)}
  .btn.ghost{background:var(--card); border:1px solid var(--line); color:var(--ink)}
  .btn.wide + .btn.wide{margin-top:8px}
  .chore.oneoff{border:1.5px dashed var(--line); background:var(--card)}
  .chore.oneoff .cname{color:var(--muted)}
  .chore.oneoff .pts{color:var(--muted); font-size:24px}
  .entry .xn{font-weight:800; color:var(--accent); margin-left:4px}
  button.entry{width:100%; text-align:left; border:none; font:inherit; color:inherit;
    background:var(--card); cursor:pointer}
  button.entry:active{background:rgba(255,255,255,.05)}
  /* Gesperrte Zeilen (fremde Eintraege am persoenlichen Link): gleiche Optik, nicht tippbar */
  div.entry{border:none}
  #toast.show{pointer-events:auto}   /* Aktions-Toast (Rückgängig) muss klickbar sein */
  #toast .tact{margin-left:12px; border:none; background:none; color:var(--accent);
    font-family:var(--body); font-size:14px; font-weight:800; cursor:pointer; padding:4px 2px}
  .btn.danger{color:var(--red); border-color:var(--red); background:none}
  .hint{font-size:13px; color:var(--muted); margin-top:10px}

  /* Einheitliche Sheet-Anatomie: Grabber · Kopf (Slot · Titel · Slot) · Body · Primäraktion unten */
  .grabber{width:40px; height:4px; border-radius:999px; background:var(--line); margin:0 auto 14px}
  .sheetbar{display:flex; align-items:center; gap:8px; margin-bottom:16px}
  .sheetbar h2{margin:0; font-size:18px; flex:1; text-align:center}
  .slot{flex:0 0 84px; display:flex; align-items:center}   /* feste Breite → Titel bleibt zentriert */
  .slot.end{justify-content:flex-end}
  .barbtn{border:none; background:none; font-size:16px; font-weight:600; color:var(--muted);
    cursor:pointer; padding:8px 4px; font-family:var(--body); text-align:left}
  .barbtn.del{color:var(--red); font-weight:700}
  .x{border:none; background:none; color:var(--muted); font-size:26px; line-height:1;
    cursor:pointer; padding:2px 4px; font-family:var(--body)}
  .btn.wide{width:100%; margin-top:6px}

    padding:11px 0 11px 12px; border:1px solid var(--line); border-radius:10px; background:#161D19}
  .ptsrow{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:2px}
  .ptsrow output{font-family:var(--display); font-weight:800; font-size:30px; color:var(--accent)}
  input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:40px; background:none; margin:0}
  input[type=range]::-webkit-slider-runnable-track{height:12px; border-radius:999px;
    background:linear-gradient(to right, var(--accent) var(--fill,20%), #252F29 var(--fill,20%))}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:30px; height:30px; border-radius:50%;
    background:#fff; border:4px solid var(--accent); margin-top:-9px; box-shadow:0 2px 8px rgba(0,0,0,.45)}
  input[type=range]::-moz-range-track{height:12px; border-radius:999px; background:#252F29}
  input[type=range]::-moz-range-progress{height:12px; border-radius:999px; background:var(--accent)}
  input[type=range]::-moz-range-thumb{width:26px; height:26px; border-radius:50%; background:#fff; border:4px solid var(--accent)}

  .mrow{display:flex; gap:8px; align-items:center; margin-bottom:8px}
  .mrow input[type=text]{flex:1; padding:10px 12px; font-size:16px; border:1px solid var(--line); border-radius:10px; background:#161D19; color:var(--ink)}
  .mrow input[type=color]{width:42px; height:42px; border:none; background:none; padding:0; cursor:pointer}
  .mrow .menupop{top:auto; bottom:100%; margin:0 0 4px}   /* im Sheet nach OBEN aufklappen (kein Clipping) */
  .shrow{padding:14px 0; border-top:1px solid var(--line); display:flex; flex-direction:column; align-items:center; gap:10px}
  .shrow:first-of-type{border-top:none}
  .shhead{display:flex; align-items:center; gap:10px; width:100%}
  .shname{flex:1; font-weight:600; font-size:16px}
  .shbtn{border:none; border-radius:999px; padding:9px 18px; font-size:15px; font-weight:700; background:var(--accent); color:#0C1220; cursor:pointer}
  .shqr{border-radius:12px; background:#fff; padding:8px; margin:10px auto 0; display:block}
  .qrwrap{margin:10px auto 0; text-align:center}
  .qrwrap[hidden]{display:none}
  .qrcap{font-size:12px; color:var(--muted); margin-top:6px; font-weight:600}
  .shrow .subnote{color:var(--muted); font-size:12px; display:block; margin-top:2px}
  .savenote{margin-top:10px; padding:10px 12px; border-radius:12px; font-size:13px; line-height:1.5;
    background:rgba(240,190,80,.10); border:1px solid rgba(240,190,80,.35); color:var(--ink)}
  .shapp{border-top:1px solid var(--line); background:rgba(232,163,61,.06); border-radius:12px; padding:12px 10px; margin-top:6px}
  .qrtog{border:1px solid var(--line); background:var(--card); color:var(--muted); border-radius:999px;
    padding:8px 13px; font-size:13px; font-weight:700; cursor:pointer; margin-right:8px}
  .qrtog.on{background:color-mix(in srgb, var(--accent) 22%, transparent); color:var(--ink); border-color:transparent}
  .shfam .shname{color:var(--muted); font-size:14px}
  .install{border:1px solid var(--line); border-radius:14px; background:var(--card); margin:14px 0 2px; overflow:hidden}
  .install summary{list-style:none; cursor:pointer; padding:12px 14px; font-weight:700; font-size:14px;
    display:flex; align-items:center; justify-content:space-between; gap:8px}
  .install summary::-webkit-details-marker{display:none}
  .install .chev{color:var(--muted); transition:transform .15s ease}
  .install[open] .chev{transform:rotate(180deg)}

<script>
  // Haushaltsnamen SYNCHRON vor dem ersten Paint setzen (kein «Fairli»-Flackern).
  // Läuft während des Parsens, direkt nachdem der <h1> existiert.
  (function () {
    function famFromUrl() {
      var s = location.pathname + location.search + location.hash;
      var m = s.match(/f\/([a-z0-9-]{4,64})/i);
      return m ? m[1].toLowerCase() : null;
    }
    function famStored() {
      var keys = ['haushalt.route.family', 'haushalt.route.user', 'haushalt.route'];
      for (var i = 0; i < keys.length; i++) {
        try {
          var r = JSON.parse(localStorage.getItem(keys[i]));
          if (r && r.family) return r.family;
        } catch (e) {}
      }
      return null;
    }
    // Braucht der Titel im GETEILTEN Layout (Buttons daneben) mehr als seine
    // 2 Clamp-Zeilen, rutschen die Buttons in eine eigene Zeile (.wide).
    // Messung IMMER im geteilten Layout (Klasse vorher runter) → deterministisch,
    // kein Oszillieren; synchron im selben Frame → kein Flackern.
    window.__updateWide = function () {
      var head = document.getElementById('apphead');
      var h1 = document.getElementById('famTitle');
      if (!head || !h1) return;
      head.classList.remove('wide');
      void h1.offsetHeight;
      // Epsilon = halbe Zeilenhoehe: bei EXAKT 2 Zeilen rundet scrollHeight
      // je nach Font 1–3 px ueber clientHeight (Zeilenhoehen-Bruchteile) —
      // eine ECHTE dritte Zeile liegt eine ganze Zeilenhoehe drueber
      var fs = parseFloat(getComputedStyle(h1).fontSize) || 30;
      if (h1.scrollHeight > h1.clientHeight + fs / 2) head.classList.add('wide');
    };
    // Einzige Quelle der Wahrheit für Titel + Größenlogik; render() ruft dasselbe auf.
    window.__setFamTitle = function (name) {
      var h1 = document.getElementById('famTitle');
      var head = document.getElementById('apphead');
      if (!h1) return;
      if (!name) { h1.innerHTML = '&nbsp;'; return; }   // Platzhalter hält die Höhe
      h1.textContent = name;
      document.title = name;
      var n = name.length;
      // Größenstufe als --titlefs am HEADER: Titel UND Logo folgen ihr
      // gemeinsam («Logo so gross wie das R» gilt für jede Stufe)
      head.style.setProperty('--titlefs', n > 22 ? 'clamp(21px, 5.9vw, 26px)'
                                        : n > 14 ? 'clamp(25px, 7.4vw, 31px)'
                                        : 'clamp(30px, 9.2vw, 38px)');
      h1.style.fontSize = '';
      if (window.__afterTitle) window.__afterTitle(); else window.__updateWide();
    };
    var fam = famFromUrl() || famStored();
    var name = '';
    if (fam) {
      try {
        var st = JSON.parse(localStorage.getItem('haushalt.v2:' + fam));
        name = (st && st.famName) || '';
      } catch (e) {}
    }
    window.__setFamTitle(name);
  })();
</script>

<script>
(() => {
  const APP_VERSION = '4.47.5';
  const uid = () => Math.random().toString(36).slice(2, 10);

  // ---------- Familien-Routing ----------
  // #f/<familie>           → Familien-Link (voller Zugriff)
  // #f/<familie>/u/<slug>  → persönlicher Link (Punkte nur für sich selbst)
  const LS_ROUTE = 'haushalt.route';
  // BASE robust bestimmen: auf tiefen Pfaden (/chores/f/...) liegt die App-
  // Wurzel VOR dem «f/»-Segment. Sonst: Verzeichnis der aktuellen Datei.
  const BASE = (() => {
    const m = location.pathname.match(/^(.*?\/)f\/[a-z0-9-]{4,}/i);
    if (m) return m[1];
    return location.pathname.replace(/index\.html$/, '').replace(/[^/]*$/, '');
  })();
  function parseRouteString(s) {
    if (!s) return null;
    const m = s.match(/f\/([a-z0-9-]{4,64})(?:\/u\/([a-z0-9]{4,64}))?/i);
    return m ? { family: m[1].toLowerCase(), userSlug: m[2] ? m[2].toLowerCase() : null } : null;
  }
  // Getrennte Speicherung: Admin-Geräte behalten ihre Familien-Route, auch
  // wenn zwischendurch ein persönlicher Link geöffnet wird. Bare-Launch
  // (installierte Familien-App, getippte URL) stellt bevorzugt die
  // FAMILIEN-Route wieder her; reine Mitglieder-Geräte fallen auf ihre
  // persönliche Route zurück. Persönliche Shortcuts tragen ihre URL selbst.
  function saveRoute(r) {
    try {
      const key = r.userSlug ? LS_ROUTE + '.user' : LS_ROUTE + '.family';
      localStorage.setItem(key, JSON.stringify(r));
      localStorage.setItem(LS_ROUTE, JSON.stringify(r)); // legacy/Resume-Anzeige
    } catch {}
  }
  function loadRoute() {
    try {
      return JSON.parse(localStorage.getItem(LS_ROUTE + '.family'))
          || JSON.parse(localStorage.getItem(LS_ROUTE + '.user'))
          || JSON.parse(localStorage.getItem(LS_ROUTE));
    } catch { return null; }
  }
  // kanonische Pfad-URL einer Familie/Person (für Teilen & Homescreen-Install)
  function routeUrl(family, slug) {
    return location.origin + BASE + 'f/' + family + (slug ? '/u/' + slug : '');
  }
  // Huebsche Basis NUR fuer geteilte/angezeigte Links (Einladen, Empfehlen,
  // QR-Code). '/chores/' bleibt der kanonische App-Standort.
  const SHARE_BASE = '/fairli/';
  function shareRouteUrl(family, slug) {
    return location.origin + SHARE_BASE + 'f/' + family + (slug ? '/u/' + slug : '');
  }

  // Reihenfolge der Quellen: ?r= (vom 404-Handoff), echter Pfad, Hash (legacy).
  let route = null;
  const qr = new URLSearchParams(location.search).get('r');
  if (qr) route = parseRouteString(qr);
  if (!route) route = parseRouteString(location.pathname); // Regex ist nicht verankert
  if (!route) {
    // Kanal 2 des 404-Handoffs: sessionStorage (immun gegen Query-Stripping,
    // z. B. iOS Link Tracking Protection — ?r ist ein nutzeridentifizierender
    // Query-Parameter, exakt die Kategorie, die Apple filtert)
    try { route = parseRouteString(sessionStorage.getItem('fairli.handoff')); } catch {}
  }
  try { sessionStorage.removeItem('fairli.handoff'); } catch {}
  if (!route) route = parseRouteString(location.hash.replace(/^#\/?/, ''));

  if (route) {
    saveRoute(route);
    // URL auf saubere Pfadform bringen, ohne Reload (auch für Standalone-Reloads)
    try { history.replaceState(null, '', routeUrl(route.family, route.userSlug)); } catch {}
  } else {
    route = loadRoute();
    if (route && route.family) {
      try { history.replaceState(null, '', routeUrl(route.family, route.userSlug)); } catch {}
    }
  }
  const FAMILY = (route && route.family) || null;
  const USER_SLUG = (route && route.userSlug) || null;

  // --- Manifest per INJEKTION, nie statisch (v4.20.0) ---
  // GELERNT (Tier-2-Capture, plist-Beweis 13.07.): WebKit registriert ein
  // statisches Manifest beim PARSEN. Das fruehere JS-ENTFERNEN des Links
  // war kosmetisch — «Zum Home-Bildschirm» backte weiterhin start_url
  // (= index.html) ein. Maintainer-Hypothese, per Ground Truth bestaetigt.
  // Deshalb: der Link existiert im HTML gar nicht; nur Android/Desktop im
  // FAMILIEN-Kontext bekommt ihn per JS (Chrome liest spaet injizierte
  // Manifeste fuer Install/WebAPK). iOS nutzt so garantiert die aktuelle
  // URL; persoenliche Links bleiben ueberall manifest-frei (mehrere
  // Personen-Shortcuts pro Geraet).
  const IS_IOS = /iphone|ipad|ipod/i.test(navigator.userAgent) ||
                 (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (!IS_IOS && !USER_SLUG) {
    const l = document.createElement('link');
    l.rel = 'manifest'; l.href = '/chores/manifest.json';
    document.head.appendChild(l);
  }

  window.addEventListener('popstate', () => {
    const r = parseRouteString(location.pathname.slice(BASE.length)) ||
              parseRouteString(location.hash.replace(/^#\/?/, ''));
    if (r && (!route || r.family !== route.family || r.userSlug !== route.userSlug)) {
      saveRoute(r); location.reload();
    }
  });

  const LS_STATE = 'haushalt.v2:' + FAMILY;
  const LS_CFG   = 'haushalt.sync';
  // Frueher: EIN Schluessel pro Familie — den sich Admin-Ansicht und persoenliche
  // Links TEILTEN. Ein Besuch auf einem fremden persoenlichen Link stempelte damit dessen «Ich bin»
  // auch in die Admin-Ansicht. Jetzt: nur der Admin-Kontext merkt sich eine Wahl.
  const LS_ME_OLD = 'haushalt.me:' + FAMILY;
  const LS_ME     = 'haushalt.me:' + FAMILY + ':admin';
  const CHORE_COLORS = ['#52C08A','#E8B931','#5FA8E8','#E8746A','#B585E8',
                        '#E89C4B','#4BC4C4','#E86AA8','#A8C45B','#8A93E8'];
  // ============ i18n (v4.27.0) ============
  // Deutsch ist die Quellsprache: der deutsche String IST der Schluessel.
  // Fehlt eine Uebersetzung, erscheint Deutsch — nie ein leerer Text.
  const LANGS = { de: 'Deutsch', en: 'English', fr: 'Français', it: 'Italiano',
                  es: 'Español', pt: 'Português', ro: 'Română', nl: 'Nederlands',
                  pl: 'Polski', tr: 'Türkçe', sv: 'Svenska', da: 'Dansk',
                  ru: 'Русский', uk: 'Українська', hi: 'हिन्दी', zh: '中文',
                  ja: '日本語', ko: '한국어', vi: 'Tiếng Việt', id: 'Bahasa Indonesia' };
  const LS_LANG = 'haushalt.lang';
  let LANG = (() => {
    try { const s = localStorage.getItem(LS_LANG); if (s && LANGS[s]) return s; } catch {}
    const b = (navigator.language || 'de').slice(0, 2).toLowerCase();
    return LANGS[b] ? b : 'en' in LANGS && b !== 'de' ? 'en' : 'de';
  })();
  let DICT = {};
  const LOCALES = { de: 'de-CH', en: 'en-GB', fr: 'fr-CH', it: 'it-CH',
                    es: 'es-ES', pt: 'pt-PT', ro: 'ro-RO', nl: 'nl-NL',
                    pl: 'pl-PL', tr: 'tr-TR', sv: 'sv-SE', da: 'da-DK',
                    ru: 'ru-RU', uk: 'uk-UA', hi: 'hi-IN', zh: 'zh-CN',
                    ja: 'ja-JP', ko: 'ko-KR', vi: 'vi-VN', id: 'id-ID' };
  let LOCALE = LOCALES[LANG] || 'de-CH';
  function t(s, vars) {
    let out = (LANG !== 'de' && DICT[s]) || s;
    if (vars) for (const k in vars) out = out.replaceAll('{' + k + '}', vars[k]);
    return out;
  }
  async function loadDict(lang) {
    if (lang === 'de') { DICT = {}; return; }
    const ck = 'haushalt.dict:' + lang;
    try { const c = localStorage.getItem(ck); if (c) DICT = JSON.parse(c); } catch {}
    try {
      const r = await fetch('/chores/i18n/' + lang + '.json', { cache: 'no-cache' });
      if (r.ok) { DICT = await r.json(); try { localStorage.setItem(ck, JSON.stringify(DICT)); } catch {} }
    } catch {}   // offline: localStorage-Kopie oder Deutsch-Fallback
  }
  // Statisches HTML uebersetzen: [data-i18n] merkt sich das deutsche Original
  const ATTR_I18N = [
    ['cName', 'placeholder'], ['cNote', 'placeholder'],
    ['cancelChore', 'aria-label'], ['closeMembers', 'aria-label'],
    ['installBarClose', 'aria-label'], ['openAdd', 'aria-label'],
    ['newsBarClose', 'aria-label']
  ];
  function translatePage() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      if (!el.dataset.src) el.dataset.src = el.textContent.trim();
      el.textContent = t(el.dataset.src);
    });
    for (const [id, attr] of ATTR_I18N) {
      const el = document.getElementById(id);
      if (!el) continue;
      const key = 'src' + attr.replace('-', '');
      if (!el.dataset[key]) el.dataset[key] = el.getAttribute(attr);
      el.setAttribute(attr, t(el.dataset[key]));
    }
    document.documentElement.lang = LANG;
  }
  async function setLang(lang) {
    if (!LANGS[lang]) return;
    LANG = lang; LOCALE = LOCALES[lang] || 'de-CH';
    try { localStorage.setItem(LS_LANG, lang); } catch {}
    await loadDict(lang);
    translatePage();
    if (typeof render === 'function') render();
  }
  function openMaxPtsSheet() {
    let sh = document.getElementById('maxPtsSheet');
    if (!sh) { sh = document.createElement('dialog'); sh.id = 'maxPtsSheet'; document.body.appendChild(sh); enableBackdropClose(sh); }
    sh.innerHTML = `<div class="sheet">
      <div class="grabber"></div>
      <div class="sheetbar">
        <div class="slot"></div>
        <h2>${t('Max. Punkte')}</h2>
        <div class="slot end"><button type="button" class="x" id="closeMaxPts" aria-label="${t('Schließen')}">×</button></div>
      </div>
      ${[3, 5, 10].map(v =>
        `<button class="menuitem" data-maxpts="${v}" style="border-radius:12px${v === MAXPTS ? ';color:var(--accent)' : ''}">${v}${v === MAXPTS ? ' ✓' : ''}</button>`).join('')}
      <p style="color:var(--muted);font-size:13px;margin:10px 4px 2px">${t('Mehrfach tippen addiert — die Skala ist keine harte Grenze.')}</p>
    </div>`;
    sh.querySelector('#closeMaxPts').onclick = () => sh.close();
    sh.querySelectorAll('[data-maxpts]').forEach(b => b.onclick = () => { setMaxPts(+b.dataset.maxpts); sh.close(); });
    sh.showModal();
  }
  function openSortSheet() {
    let sh = document.getElementById('sortSheet');
    if (!sh) { sh = document.createElement('dialog'); sh.id = 'sortSheet'; document.body.appendChild(sh); enableBackdropClose(sh); }
    const OPTS = [['created', t('Nach Erstellung')], ['alpha', t('Alphabetisch')], ['usage', t('Nach Nutzung')]];
    sh.innerHTML = `<div class="sheet">
      <div class="grabber"></div>
      <div class="sheetbar">
        <div class="slot"></div>
        <h2>${t('Sortierung')}</h2>
        <div class="slot end"><button type="button" class="x" id="closeSort" aria-label="${t('Schließen')}">×</button></div>
      </div>
      ${OPTS.map(([mode, label]) =>
        `<button class="menuitem" data-sort="${mode}" style="border-radius:12px${mode === SORT ? ';color:var(--accent)' : ''}">${label}${mode === SORT ? ' ✓' : ''}</button>`).join('')}
    </div>`;
    sh.querySelector('#closeSort').onclick = () => sh.close();
    sh.querySelectorAll('[data-sort]').forEach(b => b.onclick = () => { setSort(b.dataset.sort); sh.close(); });
    sh.showModal();
  }
  function openLangSheet() {
    let sh = document.getElementById('langSheet');
    if (!sh) { sh = document.createElement('dialog'); sh.id = 'langSheet'; document.body.appendChild(sh); enableBackdropClose(sh); }
    sh.innerHTML = `<div class="sheet">
      <div class="grabber"></div>
      <div class="sheetbar">
        <div class="slot"></div>
        <h2>${t('Sprache')}</h2>
        <div class="slot end"><button type="button" class="x" id="closeLang" aria-label="${t('Schließen')}">×</button></div>
      </div>
      ${Object.entries(LANGS).map(([code, name]) =>
        `<button class="menuitem" data-lang="${code}" style="border-radius:12px${code === LANG ? ';color:var(--accent)' : ''}">${name}${code === LANG ? ' ✓' : ''}</button>`).join('')}
      <p style="color:var(--muted);font-size:13px;margin:10px 4px 2px">${t('Weitere Sprachen folgen.')}</p>
    </div>`;
    sh.querySelector('#closeLang').onclick = () => sh.close();
    sh.querySelectorAll('[data-lang]').forEach(b => b.onclick = async () => { await setLang(b.dataset.lang); sh.close(); });
    sh.showModal();
  }

  // ---------- Einstellungen (v4.31.0) ----------
  function openSettingsSheet() {
    let sh = document.getElementById('settingsSheet');
    if (!sh) { sh = document.createElement('dialog'); sh.id = 'settingsSheet'; document.body.appendChild(sh); enableBackdropClose(sh); }
    const encState = IS_ENC ? t('Aktiv ✓') : t('Aus');
    sh.innerHTML = `<div class="sheet">
      <div class="grabber"></div>
      <div class="sheetbar">
        <div class="slot"></div>
        <h2>${t('Einstellungen')}</h2>
        <div class="slot end"><button class="x" id="closeSettings" aria-label="${t('Schließen')}">×</button></div>

  async function runMigration(sh) {
    const st = sh.querySelector('#migStatus');
    const say = m => { st.textContent = m; };
    sh.querySelector('#migGo').disabled = true;
    try {
      await CRYPTO_READY;
      say(t('Backup wird erstellt…'));
      // 1. Frischen Stand ziehen und als JSON-Backup aufs Geraet laden
      const [members, chores, logRows, fams] = await Promise.all([
        sb('members?select=*'), sb('chores?select=*'), sb('log?select=*'), sb('families?select=*')]);
      const backup = { exportedAt: new Date().toISOString(), family: FAMILY,
        famName: (fams[0] || {}).name || '', members, chores, log: logRows };
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' }));
      a.download = 'fairli-backup-' + FAMILY + '-' + Date.now() + '.json';
      a.click();
      // 2. Kryptokontext auf famc umstellen und verschluesselte KOPIE schreiben
      say(t('Verschlüsselte Kopie wird geschrieben…'));
      IS_ENC = true; AESKEY = await deriveKey(); ROWFAM = await famHash('famc-');
      await sb('families', 'POST', WRITEKEY_HASH ? { name: backup.famName, write_key_hash: WRITEKEY_HASH } : { name: backup.famName });
      if (members.length) await upsert('members', members);
      if (chores.length) await upsert('chores', chores);
      if (logRows.length) await upsert('log', logRows);
      // 3. VERIFIZIEREN: Zeilenzahlen unter dem neuen Schluessel
      say(t('Kopie wird verifiziert…'));
      const [vm, vc, vl] = await Promise.all([
        sb('members?select=id'), sb('chores?select=id'), sb('log?select=id')]);
      if (vm.length !== members.length || vc.length !== chores.length || vl.length < logRows.length)
        throw new Error('Verifikation: Zeilenzahlen stimmen nicht');
      // 4. Erst NACH verifizierter Kopie: Klartext-Originale entfernen
      //    (GDPR-Zweck der Migration; Backup liegt auf dem Geraet)
      say(t('Klartext-Originale werden entfernt…'));
      const OLD = encodeURIComponent(FAMILY);
      const del = tbl => fetch(cfg.url.replace(/\/+$/, '') + '/rest/v1/' + tbl + '?family_id=eq.' + OLD, {
        method: 'DELETE', headers: { apikey: cfg.key, Authorization: 'Bearer ' + cfg.key } });
      await del('log'); await del('chores'); await del('members');
      // families-Zeile wird zum Wegweiser fuer veraltete Clients
      await fetch(cfg.url.replace(/\/+$/, '') + '/rest/v1/families?family_id=eq.' + OLD, {
        method: 'PATCH', headers: { apikey: cfg.key, Authorization: 'Bearer ' + cfg.key, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: '→ App aktualisieren / update app' }) });
      // Grabstein: Server lehnt kuenftig JEDE Klartext-Einfuegung unter der
      // alten ID ab (RLS) — schuetzt vor veralteten Cache-Staenden, die die
      // Client-Guards nicht haben. Fehler hier ist NICHT fatal (Migration
      // selbst ist fertig; Grabstein ist Zusatzschutz).
      // Roh-Fetch: sb()/famRows wuerde family_id mit ROWFAM (famc-Hash!)
      // ueberschreiben — der Grabstein gilt aber der ALTEN Klartext-ID.
      try {
        await fetch(cfg.url.replace(/\/+$/, '') + '/rest/v1/retired_families', {
          method: 'POST',
          headers: { apikey: cfg.key, Authorization: 'Bearer ' + cfg.key,
            'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates,return=minimal' },
          body: JSON.stringify({ family_id: FAMILY })
        });
      } catch {}
      try { localStorage.setItem(LS_ENCV, '1'); } catch {}
      say(t('Fertig — App lädt neu.'));
      setTimeout(() => location.reload(), 900);
    } catch (e) {
      say(t('Fehlgeschlagen: {msg} — nichts wurde gelöscht, Backup liegt auf dem Gerät.', { msg: e.message }));
      sh.querySelector('#migGo').disabled = false;
      IS_ENC = FAMILY.startsWith('famx-'); ROWFAM = FAMILY; AESKEY = null;
      await CRYPTO_READY;
    }
  }

  const choreColor = id => {

  // Bild-Fehler: NICHT sofort entfernen. Beim Voll-Repaint (Cache-Miss auf

  // ============ Verschluesselung (v4.30.0, GDPR) ============
  // VERSIONS-SCHNITT statt Migration: Familien-IDs mit Praefix 'famx-' sind
  // Ende-zu-Ende-verschluesselt; alte 'fam-'-Familien bleiben fuer immer
