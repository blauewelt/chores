  // fam-Familie migriert ist, klaert eine einmalige Probe (existiert die
  // families-Zeile unter dem Hash?), Ergebnis im localStorage-Cache.
  const LS_ENCV = 'haushalt.encv:' + (FAMILY || '');
  const LS_RET = 'haushalt.retired:' + (FAMILY || '');
  let IS_ENC = !!FAMILY && FAMILY.startsWith('famx-');
  let ROWFAM = FAMILY;          // DB-Schluessel (verschluesselt: Hash)
  let AESKEY = null;
  let WRITEKEY = null;          // hex; der Server kennt nur SHA-256 davon
  let WRITEKEY_HASH = null;
  const ENC_FIELDS = {
    families: ['name'], members: ['name'],
    chores: ['name', 'note', 'art'],
    log: ['chore_name', 'chore_note', 'member_name']
  };
  const b64e = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
  const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  async function famHash(prefix) {
    const h = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(FAMILY));
    return prefix + [...new Uint8Array(h)].map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 48);
  }
  async function deriveKey() {
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(FAMILY), 'HKDF', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'HKDF', hash: 'SHA-256', salt: new TextEncoder().encode('fairli-v1'), info: new TextEncoder().encode('data-key') },
      km, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
  }
  const CRYPTO_READY = (async () => {
    if (!FAMILY || !crypto.subtle) return;
    if (!IS_ENC) {
      // Migrations-Probe (einmalig, dann Cache)
      let flag = null; try { flag = localStorage.getItem(LS_ENCV); } catch {}
      if (flag === '1') IS_ENC = true;
      else if (flag !== '0') {
        try {
          const cand = await famHash('famc-');
          const r = await fetch(cfg.url.replace(/\/+$/, '') + '/rest/v1/families?select=family_id&family_id=eq.' + cand,
            { headers: { apikey: cfg.key, Authorization: 'Bearer ' + cfg.key } });
          const rows = r.ok ? await r.json() : null;
          IS_ENC = !!rows && rows.length > 0;
          try { localStorage.setItem(LS_ENCV, IS_ENC ? '1' : '0'); } catch {}
        } catch {}
      }
    }
    if (!IS_ENC) return;
    ROWFAM = await famHash(FAMILY.startsWith('famx-') ? 'famx-' : 'famc-');
    AESKEY = await deriveKey();
    // Write-Key: eigener HKDF-Ast (info 'write-key-v1'). Er geht als Header
    // an den Server — das Link-Geheimnis laesst sich daraus NICHT gewinnen.
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(FAMILY), 'HKDF', false, ['deriveBits']);
    const bits = await crypto.subtle.deriveBits(
      { name: 'HKDF', hash: 'SHA-256', salt: new TextEncoder().encode('fairli-v1'), info: new TextEncoder().encode('write-key-v1') }, km, 256);
    WRITEKEY = [...new Uint8Array(bits)].map(b => b.toString(16).padStart(2, '0')).join('');
    const wh = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(WRITEKEY));
    WRITEKEY_HASH = [...new Uint8Array(wh)].map(b => b.toString(16).padStart(2, '0')).join('');
  })();
  async function encV(s) {
    if (s == null || s === '' || !AESKEY) return s;
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, AESKEY, new TextEncoder().encode(String(s)));
    const buf = new Uint8Array(12 + ct.byteLength); buf.set(iv); buf.set(new Uint8Array(ct), 12);
    return 'enc1:' + b64e(buf);
  }
  async function decV(v) {
    if (typeof v !== 'string' || !v.startsWith('enc1:') || !AESKEY) return v;
    try {
      const buf = b64d(v.slice(5));
      const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: buf.slice(0, 12) }, AESKEY, buf.slice(12));
      return new TextDecoder().decode(pt);
    } catch { return '···'; }   // korrupte Zeile: Platzhalter statt Absturz
  }
  const tableOf = path => path.split(/[?/]/)[0];
  async function encRow(table, row) {
    const fields = ENC_FIELDS[table]; if (!fields || !IS_ENC) return row;
    const out = Object.assign({}, row);
    for (const f of fields) if (f in out) out[f] = await encV(out[f]);
    return out;
  }
  async function decRows(table, rows) {
    const fields = ENC_FIELDS[table]; if (!fields || !IS_ENC || !Array.isArray(rows)) return rows;
    for (const r of rows) for (const f of fields) if (r && f in r) r[f] = await decV(r[f]);
    return rows;
  }

  const famScope = path => path + (path.includes('?') ? '&' : '?') + 'family_id=eq.' + encodeURIComponent(ROWFAM);
  const famRows = b => Array.isArray(b)
    ? b.map(r => Object.assign({}, r, { family_id: ROWFAM }))
    : Object.assign({}, b, { family_id: ROWFAM });
  async function sb(path, method = 'GET', body) {
    await CRYPTO_READY;
    if (body && (method === 'POST' || method === 'PATCH')) {
      const tbl = tableOf(path);
      body = Array.isArray(body)
        ? await Promise.all(body.map(r => encRow(tbl, r)))
        : await encRow(tbl, body);
      body = famRows(body);
    }
    const r = await fetch(cfg.url.replace(/\/+$/, '') + '/rest/v1/' + famScope(path), {
      method,
      headers: Object.assign({
        apikey: cfg.key, Authorization: 'Bearer ' + cfg.key,
        'Content-Type': 'application/json', Prefer: 'return=minimal'
      }, method !== 'GET' && WRITEKEY ? { 'x-fairli-key': WRITEKEY } : {}),
      body: body ? JSON.stringify(body) : undefined
    });
    if (!r.ok) throw new Error(method + ' ' + path + ' → ' + r.status);
    return method === 'GET' ? decRows(tableOf(path), await r.json()) : null;
  }

  async function upsert(table, rows) {
    if (!rows.length) return;
    await CRYPTO_READY;
    rows = famRows(await Promise.all(rows.map(r => encRow(table, r))));
    const r = await fetch(cfg.url.replace(/\/+$/, '') + '/rest/v1/' + famScope(table), {
      method: 'POST',
      headers: Object.assign({ apikey: cfg.key, Authorization: 'Bearer ' + cfg.key,
        'Content-Type': 'application/json',
        Prefer: 'resolution=merge-duplicates,return=minimal' },
        WRITEKEY ? { 'x-fairli-key': WRITEKEY } : {}),
      body: JSON.stringify(rows)
    });
    if (!r.ok) throw new Error('upsert ' + table + ' → ' + r.status);
  }

  // Alle Zustaende der Abgleich-Schicht VOR pull() deklarieren (pull liest sie).
  let mutationSeq = 0;
  const pendingDeletes = new Map();   // "table:id" -> { resolvedAt }
  const pendingCreates = new Map();   // "table:id" -> { row, resolvedAt }
  async function pull() {
    if (!cfg) return;
    const pullStartedAt = Date.now();
    const seqAtStart = mutationSeq;
    try {
      // Egress-Diaet (v4.36.0): schlanke Spalten; Log per DELTA, wenn ein
      // Wasserzeichen existiert und der letzte VOLL-Abgleich < 24 h her ist.
      // Delta sieht neue UND (dank updated_at-Trigger) geaenderte Zeilen;
      // fremde LOESCHUNGEN erscheinen erst beim naechsten Voll-Abgleich.
      const LCOLS = 'id,chore_id,chore_name,chore_note,member_id,member_name,points,done_at,created_at,updated_at';
      const wmKey = 'haushalt.delta:' + FAMILY, fullKey = 'haushalt.full:' + FAMILY;
      let wm = null, lastFull = 0;
      try { wm = localStorage.getItem(wmKey); lastFull = +localStorage.getItem(fullKey) || 0; } catch {}
      const useDelta = !!wm && (Date.now() - lastFull) < 24 * 3600e3 && state.log.length > 0;
      const logQ = useDelta
        ? `log?select=${LCOLS}&or=(created_at.gt.${encodeURIComponent(wm)},updated_at.gt.${encodeURIComponent(wm)})&order=done_at.desc&limit=300`
        : `log?select=${LCOLS}&order=done_at.desc&limit=300`;
      const [members, chores, logRows, fam] = await Promise.all([
        sb('members?select=id,name,color,url_slug&order=name'),
        sb('chores?select=id,name,points,note,art,created_at&order=points.desc,name'),
        sb(logQ),
        sb('families?select=*')
      ]);
      // Wasserzeichen: nur SERVER-Zeit verwenden (Client-Uhren luegen)
      let newWm = wm;
      for (const r of logRows) for (const tcol of [r.created_at, r.updated_at])
        if (tcol && (!newWm || tcol > newWm)) newWm = tcol;
      const log = useDelta ? (() => {
        const byId = new Map(state.log.map(x => [x.id, x]));
        for (const r of logRows) {
          if (pendingDeletes.has('log:' + r.id)) continue;   // frisch Geloeschtes nicht auferstehen lassen
          byId.set(r.id, r);
        }
        return [...byId.values()].sort((a, b) => (a.done_at < b.done_at ? 1 : -1)).slice(0, 400);
      })() : logRows;
      try {
        if (newWm) localStorage.setItem(wmKey, newWm);
        if (!useDelta) localStorage.setItem(fullKey, String(Date.now()));
      } catch {}
      // Server sortiert nach dem SPALTENWERT — bei verschluesselten Familien
      // ist das Chiffrat (Kauderwelsch-Reihenfolge). Nach dem Entschluesseln
      // clientseitig alphabetisch sortieren, fuer alle Familien einheitlich.
      members.sort((a, b) => String(a.name).localeCompare(String(b.name), LOCALE, { sensitivity: 'base' }));
      state.famName = (fam[0] && fam[0].name) || '';
      // Backfill: verschluesselte Familie, deren families-Zeile noch keinen
      // Write-Key-Hash traegt (vor v4.36 migriert) → einmalig nachruesten.
      // NICHT via push(): das erhoeht mutationSeq und entwertete DIESEN pull
      // (Stale-Snapshot-Abbruch, bevor state gesetzt ist). Reiner Fetch.
      const needBackfill = IS_ENC && WRITEKEY_HASH && fam[0] && !fam[0].write_key_hash;
      // Während die Ersteinrichtung offen ist, NICHTS am DOM/State anfassen –
      // sonst werden Eingaben überschrieben.
      if (firstRunOpen) { syncOk = true; return; }
      if (!members.length && !state.famName && !USER_SLUG) {
        // Komplett neue Familie → Ersteinrichtung (nur einmal)
        syncOk = true; firstRunSetup(); return;
      }
      if (!members.length && !(fam[0] && fam[0].name)) {
        // WIRKLICH leeres Backend (auch keine families-Zeile) → dieses
        // Geraet laedt seinen lokalen Stand hoch. Existiert die
        // families-Zeile, ist die Familie bekannt (z. B. migriert,
        // Wegweiser-Name) — Hochladen waere Klartext-AUFERSTEHUNG (v4.33.1)
        await upsert('members', state.members);
        await upsert('chores', state.chores);
        await upsert('log', state.log);
      } else if (!members.length && !IS_ENC && FAMILY && !FAMILY.startsWith('famx-')) {
        // Alt-Familie, leere Mitglieder, aber families-Zeile existiert:
        // vermutlich MIGRIERT waehrend unsere Probe '0' gecacht war.
        // Cache verwerfen und EINMAL neu starten (Schleifen-Schutz).
        try {
          if (!sessionStorage.getItem('haushalt.reprobe')) {
            sessionStorage.setItem('haushalt.reprobe', '1');
            localStorage.removeItem(LS_ENCV);
            location.reload();
            return;
          }
        } catch {}
        syncOk = true;
      }
      // Stale-Guard NUR fuer die Zustands-UEBERNAHME — die Heil-Zweige oben
      // (Ersteinrichtung, Upload-Wache, Re-Probe) duerfen nie durch eine
      // zufaellige Boot-Schreibung ausgehungert werden. (v4.36.2 —
      // Der eingefrorene Mittwoch (Live-Incident): leerer Stale-Zweig ohne return
      // fiel bis save()/render() durch und zementierte den Cache.)
      if (mutationSeq !== seqAtStart) {
        // Waehrend dieses pull wurde lokal geaendert → Snapshot ist veraltet.
        // Lokalen (optimistischen) Stand behalten; der naechste pull gleicht ab.
        syncOk = true; return;
      }
      {
        state.members = reconcile('members', members, pullStartedAt);
        state.chores  = reconcile('chores',  chores,  pullStartedAt);
        state.log     = reconcile('log',     log,     pullStartedAt)
                          .sort((a, b) => (a.done_at < b.done_at ? 1 : -1));
      }
      if (USER_SLUG) {
        const lm = state.members.find(m => (m.url_slug || '').toLowerCase() === USER_SLUG);
        if (lm) { me = lm.id; }   // bewusst NICHT persistieren (siehe LS_ME oben)
        else if (state.members.length) { showBadLink(); return; }
      }
      syncOk = true; save(); render();
      if (needBackfill) {
        try {
          await fetch(cfg.url.replace(/\/+$/, '') + '/rest/v1/families?family_id=eq.' + encodeURIComponent(ROWFAM), {
            method: 'PATCH',
            headers: Object.assign({ apikey: cfg.key, Authorization: 'Bearer ' + cfg.key,
              'Content-Type': 'application/json', Prefer: 'return=minimal' },
              WRITEKEY ? { 'x-fairli-key': WRITEKEY } : {}),
            body: JSON.stringify({ write_key_hash: WRITEKEY_HASH })
          });
        } catch {}
      }
    } catch (e) { syncOk = false; render(); }
  }

  let firstRunOpen = false;
  function firstRunSetup() {
    if (firstRunOpen || document.getElementById('firstRun')) return; // nie doppelt
    firstRunOpen = true;
    const SEED = [
      ['Küche aufräumen', 1], ['Geschirr ausräumen', 1], ['Einkaufen', 2],
      ['Kochen', 2], ['Wäsche waschen', 1], ['Bad putzen', 3], ['Müll rausbringen', 1]
    ];
    const d = document.createElement('div');
    d.id = 'firstRun';
    d.style.cssText = 'position:fixed;inset:0;z-index:99;background:var(--bg);overflow:auto;padding:32px 22px calc(32px + env(safe-area-inset-bottom))';
    d.innerHTML = `
      <div style="max-width:460px;margin:0 auto;display:flex;flex-direction:column;gap:18px">
        <h1 style="font-family:var(--display);font-weight:800;font-size:30px;margin:0;background:linear-gradient(100deg,#EAF1EB,var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent">Neuer Haushalt</h1>
        <label style="display:flex;flex-direction:column;gap:6px;color:var(--muted);font-size:14px">Name des Haushalts
          <input id="frName" type="text" maxlength="40" placeholder="z. B. WG Sonnenstrasse" style="padding:12px;font-size:16px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink)"></label>
        <div style="color:var(--muted);font-size:14px">Personen (eine pro Zeile)</div>
        <textarea id="frMembers" rows="4" placeholder="Anna&#10;Ben&#10;Carla" style="padding:12px;font-size:16px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);resize:vertical"></textarea>
        <label style="display:flex;gap:9px;align-items:center;color:var(--ink);font-size:15px"><input id="frSeed" type="checkbox" checked style="width:18px;height:18px"> Typische Aufgaben vorausfüllen</label>
        <button id="frGo" style="border:none;border-radius:999px;padding:14px;font-size:16px;font-weight:700;background:var(--accent);color:#0C1220;cursor:pointer">Los geht's</button>
      </div>`;
    document.body.appendChild(d);
    document.getElementById('frGo').onclick = async () => {
      const name = document.getElementById('frName').value.trim() || 'Haushalt';
      const names = document.getElementById('frMembers').value.split('\n').map(s => s.trim()).filter(Boolean);
      const seed = document.getElementById('frSeed').checked;
      state.famName = name;
      state.members = (names.length ? names : ['Ich']).map((n, i) => ({ id: uid(), name: n, color: palette[i % palette.length] }));
      state.chores = seed ? SEED.map(([n, p]) => ({ id: uid(), name: n, points: p })) : [];
      state.log = [];
      save();
      try {
        await sb('families', 'POST', WRITEKEY_HASH ? { name, write_key_hash: WRITEKEY_HASH } : { name });   // family_id setzt famRows (bei famx: Hash!)
        await upsert('members', state.members);
        if (state.chores.length) await upsert('chores', state.chores);
      } catch {}
      firstRunOpen = false;
      try { localStorage.setItem(OB_KEY, '1'); } catch {}   // Schritt 1 kommt jetzt explizit
      d.remove(); render();
      openOnboardSheet(true);   // Schritt 1: Link sichern → «Weiter» → Einladen-Sheet
    };
  }

  let badLinkShown = false;
  function showBadLink() {
    if (badLinkShown) return; badLinkShown = true;
    const d = document.createElement('div');
    d.style.cssText = 'position:fixed;inset:0;z-index:99;background:var(--bg);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:32px;gap:12px';
    d.innerHTML = `<h2 style="font-family:var(--display);margin:0">Link ungültig</h2>
      <p style="color:var(--muted);max-width:300px;margin:0">Dieser persönliche Link wurde nicht gefunden oder zurückgezogen. Bitte einen neuen Link anfordern.</p>`;
    document.body.appendChild(d);
  }

  function push(fn) {           // optimistisches Schreiben
    if (!cfg) return;
    mutationSeq++;              // jede lokale Schreibung entwertet laufende pulls
    fn().then(() => { syncOk = true; renderSyncDot(); })
        .catch(err => { syncOk = false; renderSyncDot(); if (!err || !err.silent) toast(t('Sync fehlgeschlagen')); });
  }

  // ---------- Abgleich lokaler Schreibvorgaenge mit pull() ----------
  // Problem: pull() ueberschreibt state.* komplett mit dem Serverstand. Ein
  // pull, der VOR einer lokalen Aenderung startete (oder bevor der Server sie
  // committet hat), bringt geloeschte Zeilen zurueck bzw. schluckt neue —
  // sichtbar als Flackern. Zwei Schutzmechanismen:
  //   1. mutationSeq: aendert sich waehrend eines pull etwas lokal, ist dessen
  //      Snapshot veraltet und wird verworfen.
  //   2. pendingDeletes/pendingCreates: bis der Server die Schreibung
  //      nachweislich verarbeitet hat (resolvedAt < pullStart), werden
  //      Serverzeilen entsprechend gefiltert bzw. ergaenzt.

  // Loeschen ist VERIFIZIERT (v4.33.0): 1 Wiederholung, danach ehrlicher
  // Fehlerzustand via onFail (Zeile wiederherstellen) statt stillem Verlust.
  // Hintergrund: fire-and-forget-DELETE konnte scheitern, waehrend die Kachel
  // optimistisch verschwand — die Zeile kam nach dem reconcile-Fenster
  // kommentarlos zurueck (so entstand mutmasslich das Haus-kühlen-Duplikat).
  function deleteRemote(table, id, onFail) {
    const key = table + ':' + id;
    pendingDeletes.set(key, { resolvedAt: null });
    pendingCreates.delete(key);       // lokal angelegt und gleich wieder geloescht
    const attempt = () => sb(table + '?id=eq.' + id, 'DELETE');
    push(() => attempt()
      .catch(() => new Promise(res => setTimeout(res, 900)).then(attempt))
      .catch(err => {
        pendingDeletes.delete(key);   // Loeschung fand NICHT statt
        if (onFail) onFail();
        toast(t('Löschen fehlgeschlagen — wiederhergestellt'));
        const marked = new Error('delete failed (handled)');
        marked.silent = true;         // push() zeigt den Punkt rot, toastet aber nicht doppelt
        throw marked;
      })
      .then(r => {
      const e = pendingDeletes.get(key);
      if (e) e.resolvedAt = Date.now();
      return r;
    }));
  }
  function createRemote(table, row) {
    const key = table + ':' + row.id;
    pendingCreates.set(key, { row, resolvedAt: null });
    push(() => sb(table, 'POST', row).then(r => {
      const e = pendingCreates.get(key);
      if (e) e.resolvedAt = Date.now();
      return r;
    }));
  }
  // Upsert MIT Pull-Schutz (v4.46.1): registriert jede Zeile als pendente
  // Schreibung (Overlay in reconcile), bis der Server sie nachweislich hat.
  // row wird als LEBENDE Referenz gehalten — spaetere lokale Edits derselben
  // Zeile bleiben dadurch automatisch die massgebliche Fassung.
  function upsertRemote(table, rows) {
    if (!rows.length) return;
    const keys = rows.map(r => {
      const k = table + ':' + r.id;
      pendingCreates.set(k, { row: r, resolvedAt: null });
      return k;
    });
    push(() => upsert(table, rows).then(res => {
      const now = Date.now();
      for (const k of keys) { const e = pendingCreates.get(k); if (e) e.resolvedAt = now; }
      return res;
    }));
  }
  function reconcile(table, rows, pullStartedAt) {
    // Bestaetigte Schreibungen (vom Server vor Pull-Start verarbeitet) vergessen
    for (const [k, v] of pendingDeletes) {
      if (k.startsWith(table + ':') && v.resolvedAt && v.resolvedAt < pullStartedAt) pendingDeletes.delete(k);
    }
    for (const [k, v] of pendingCreates) {
      if (k.startsWith(table + ':') && v.resolvedAt && v.resolvedAt < pullStartedAt) pendingCreates.delete(k);
    }
    // Overlay-Semantik (v4.46.1): eine pendente Schreibung ERSETZT auch die
    // (moeglicherweise veraltete) Serverfassung derselben Zeile — vorher
    // schuetzte pendingCreates nur NEUE Zeilen, Umbenennungen fielen jedem
    // Pull mit Vor-Commit-Snapshot zum Opfer (Live-Bug Personen-Sheet).
    let out = rows
      .filter(r => !pendingDeletes.has(table + ':' + r.id))
      .map(r => { const p = pendingCreates.get(table + ':' + r.id); return p ? p.row : r; });
    const have = new Set(out.map(r => r.id));
    for (const [k, v] of pendingCreates) {
      if (k.startsWith(table + ':') && !have.has(v.row.id)) out.push(v.row);
    }
    return out;
  }

  // ---------- Punkte ----------
  function weekStart() {
    const d = new Date(); d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() - ((d.getDay() + 6) % 7)); // Montag
    return d.toISOString();
  }
  function totals() {
    const since = period === 'week' ? weekStart() : '';
    const t = {};
    state.members.forEach(m => t[m.id] = { pts: 0, n: 0 });
    state.log.forEach(e => {
      if (e.done_at >= since && t[e.member_id]) { t[e.member_id].pts += e.points; t[e.member_id].n++; }
    });
    return t;
  }

  // ---------- Rendering ----------
  const listEl = document.getElementById('list');
  const esc = s => { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; };

  function renderSyncDot() {
    if (!document.getElementById('syncDot')) return;
    const dot = document.getElementById('syncDot');
    dot.className = 'syncdot' + (cfg ? (syncOk === false ? ' err' : ' on') : '');
  }

  // ---------- Eingefrorene Kachel-Reihenfolge ----------
  // Wird einmal berechnet und erst neu gebildet, wenn der Nutzer es erwartet
  // (App-Start, Tab-Wechsel, Aufgabe angelegt/geändert/gelöscht) – nie durch
  // einen Hintergrund-Sync, damit nichts unter dem Finger wegspringt.
  let _orderCache = null;
  let _pinned = [];                       // frisch hinzugefügte Aufgaben: vorne, neueste zuerst
  function invalidateOrder() { _orderCache = null; }
  // Sortier-Modus (v4.33.0): 'created' (Standard — Positionen stabil, Neues
  // hinten) | 'alpha' | 'usage' (bisheriges eingefrorenes Nutzungs-Ranking)
  const LS_SORT = 'haushalt.sort';
  const LS_MAXPTS = 'haushalt.maxpts';
  let MAXPTS = (() => { try { return +localStorage.getItem(LS_MAXPTS) || 5; } catch { return 5; } })();
  function setMaxPts(v) { MAXPTS = v; try { localStorage.setItem(LS_MAXPTS, String(v)); } catch {} }
  let SORT = (() => { try { return localStorage.getItem(LS_SORT) || 'created'; } catch { return 'created'; } })();
  function setSort(mode) {
    SORT = mode;
    try { localStorage.setItem(LS_SORT, mode); } catch {}
    invalidateOrder(); render();
  }
  function sortedChores() {
    if (SORT === 'alpha')
      return state.chores.slice().sort((a, b) => a.name.localeCompare(b.name, LOCALE, { sensitivity: 'base' }));
    if (SORT === 'created')
      // created_at kommt per DB-Migration; Zeilen ohne Wert (Altbestand)
      // teilen sich den Migrations-Zeitpunkt → Name als stabiler Tiebreak.
      return state.chores.slice().sort((a, b) =>
        String(a.created_at || '') < String(b.created_at || '') ? -1 :
        String(a.created_at || '') > String(b.created_at || '') ? 1 :
        a.name.localeCompare(b.name, LOCALE, { sensitivity: 'base' }));
    return choreOrder();   // 'usage'
  }
  function pinChore(id) { _pinned = _pinned.filter(x => x !== id); _pinned.unshift(id); invalidateOrder(); }
  function choreOrder() {
    const ids = state.chores.map(c => c.id).sort().join('|');
    if (_orderCache && _orderCache.ids === ids) {
      // Gleiche Aufgaben-Menge → gemerkte Reihenfolge halten, nur fehlende
      // (theoretisch) ans Ende, gelöschte raus.
      const byId = new Map(state.chores.map(c => [c.id, c]));
      const kept = _orderCache.order.filter(id => byId.has(id)).map(id => byId.get(id));
      return applyPins(kept);
    }
    const counts = {};
    state.log.forEach(e => counts[e.chore_id] = (counts[e.chore_id] || 0) + 1);
    const groupKey = n => (n || '').trim().split(/\s+/)[0].toLowerCase();
    const groupUse = {}, groupName = {};
    state.chores.forEach(c => {
      const g = groupKey(c.name);
      groupUse[g] = (groupUse[g] || 0) + (counts[c.id] || 0);
      if (!groupName[g] || c.name.localeCompare(groupName[g], 'de', { sensitivity: 'base' }) < 0)
        groupName[g] = c.name;
    });
    const ordered = state.chores.slice().sort((a, b) => {
      const ga = groupKey(a.name), gb = groupKey(b.name);
      if (ga !== gb)
        return (groupUse[gb] - groupUse[ga])
            || groupName[ga].localeCompare(groupName[gb], 'de', { sensitivity: 'base' });
      return a.name.localeCompare(b.name, 'de', { sensitivity: 'base' });
    });
    const pinnedFirst = applyPins(ordered);
    _orderCache = { ids, order: pinnedFirst.map(c => c.id) };
    return pinnedFirst;
  }
  function applyPins(list) {
    if (!_pinned.length) return list;
    const byId = new Map(list.map(c => [c.id, c]));
    const front = _pinned.map(id => byId.get(id)).filter(Boolean);
    const frontIds = new Set(_pinned);
    return front.concat(list.filter(c => !frontIds.has(c.id)));
  }

  function render() {
    renderSyncDot();
    document.documentElement.classList.remove('booting');
    if (state.famName && window.__setFamTitle) window.__setFamTitle(state.famName);
    maybeOnboard();   // Erstbesuch (v4.45.0): «Zugriff sichern», sobald die Familie steht
    document.querySelectorAll('.tab').forEach(b =>
      b.setAttribute('aria-selected', String(b.dataset.view === view)));
    const fab = document.getElementById('openAdd');
    if (fab) fab.setAttribute('aria-label', t(view === 'log' ? 'Einmalig eintragen' : 'Aufgabe hinzufügen'));

    // Ich bin — im persönlichen Link fest auf eine Person verriegelt
    const iam = document.getElementById('iamRow');
    const shown = USER_SLUG ? state.members.filter(m => m.id === me) : state.members;
    iam.innerHTML = '<span class="lbl">Ich bin</span>' + shown.map(m =>
      `<button class="chip" data-mid="${m.id}" aria-pressed="${me === m.id}" ${USER_SLUG ? 'style="cursor:default"' : ''}>
        <span class="dot" style="background:${esc(m.color)}">${esc(initial(m.name))}</span>${esc(m.name)}
      </button>`).join('') + (USER_SLUG && !shown.length ? '<span class="lbl">…</span>' : '');
    // Mehrzeilig? Dann jede Zeile zentrieren — der Umbruch wirkt gewollt,
    // nicht uebergelaufen. Einzeilig bleibt linksbuendig wie immer.
    requestAnimationFrame(() => {
      iam.classList.toggle('multi', iam.scrollHeight > 60);
      // Kein Chip allein auf der letzten Zeile: bricht die Reihe so um,
      // dass unten mindestens ZWEI stehen (Maintainer: «two people, or 0»).
      iam.querySelectorAll('.iambrk').forEach(b => b.remove());
      const chips = [...iam.querySelectorAll('.chip')];
      if (chips.length >= 3) {
        const lines = [];
        for (const c of chips) {
          const t = c.offsetTop;
          if (!lines.length || lines[lines.length - 1].top !== t) lines.push({ top: t, els: [] });
          lines[lines.length - 1].els.push(c);
        }
        if (lines.length > 1 && lines[lines.length - 1].els.length === 1
            && lines[lines.length - 2].els.length >= 3) {
          const donor = lines[lines.length - 2].els;
          const brk = document.createElement('i');
          brk.className = 'iambrk';
          brk.style.cssText = 'flex-basis:100%;height:0;margin:0;padding:0';
          iam.insertBefore(brk, donor[donor.length - 1]);
        }
      }
    });

    if (view === 'chores') {
      // Reihenfolge ist eingefroren (siehe choreOrder()); Hintergrund-Syncs
      // aktualisieren Daten/Punkte, ordnen die Kacheln aber nicht um.
      const ordered = sortedChores();
      // «Einmalig» ist IMMER die erste Kachel (oben links verankert):
      // eintragen ohne neue Kachel — gegen die Kachel-Inflation.
      const oneOffTile = `<button class="chore oneoff" id="oneOffTile" style="min-height:104px">
          <img class="art${ARTOK.has(choreArt({ id: 'oneoff-star-v2', name: 'Sternschnuppe', art: 'a single glowing shooting star with a bright trail across a night sky' })) ? ' ok' : ''}" src="${choreArt({ id: 'oneoff-star-v2', name: 'Sternschnuppe', art: 'a single glowing shooting star with a bright trail across a night sky' })}" alt="" loading="lazy" onload="artOk(this)" onerror="artRetry(this)">
          <span class="cname">${t('Einmalig')}</span>
          <span class="cnote">${t('eintragen ohne Kachel')}</span>
          <span class="pts">＋</span>
        </button>`;
      listEl.innerHTML = `<div class="grid">` + oneOffTile + ordered.map(c =>
            `<button class="chore" data-cid="${c.id}" style="--c:${choreColor(c.id)}; min-height:${Math.round(104 + 34 * Math.log2(c.points + 1))}px">
              <img class="art${ARTOK.has(choreArt(c)) ? ' ok' : ''}" src="${choreArt(c)}" alt="" loading="lazy" onload="artOk(this)" onerror="artRetry(this)">
              <span class="cname">${esc(c.name)}</span>
              ${c.note ? `<span class="cnote">${esc(c.note)}</span>` : ''}
              <span class="pts">${c.points >= 10 ? '★ ' : ''}+${c.points}</span>
              <span class="edit" data-edit="${c.id}" role="button" aria-label="Bearbeiten">✎</span>
            </button>`).join('') + `</div>` +
        (ordered.length ? '' : `<div class="empty"><b>${t('Noch keine Aufgaben')}</b>${t('Lege mit + die erste an – z. B. «Geschirrspüler ausräumen, 3 Punkte».')}</div>`);
      listEl.querySelectorAll('img.art:not(.ok)').forEach(i => { if (i.complete && i.naturalWidth) artOk(i); });
    } else if (view === 'scores') {
      // WICHTIG: nie `t` nennen — das schattet die i18n-Funktion t()!
      // (Live-Bug v4.27–v4.31: «t is not a function», Punkte-Tab leer)
      const tot = totals();
      const max = Math.max(1, ...Object.values(tot).map(x => x.pts));
      const ranked = state.members.slice().sort((a, b) => tot[b.id].pts - tot[a.id].pts);
      listEl.innerHTML =
        `<div class="period">
          <button data-p="week" aria-pressed="${period === 'week'}">${t('Diese Woche')}</button>
          <button data-p="all" aria-pressed="${period === 'all'}">${t('Gesamt')}</button>
        </div>` +
        ranked.map((m, i) => `
          <div class="score">
            <div class="top">
              <span class="dot" style="background:${esc(m.color)}">${esc(initial(m.name))}</span>
              <span class="name">${esc(m.name)}${i === 0 && tot[m.id].pts > 0 ? ' 👑' : ''}</span>
              <span class="num">${tot[m.id].pts}</span>
            </div>
            <div class="bar"><i style="width:${Math.round(tot[m.id].pts / max * 100)}%; background:${esc(m.color)}"></i></div>
            <div class="sub">${t(tot[m.id].n === 1 ? '{n} Aufgabe erledigt' : '{n} Aufgaben erledigt', { n: tot[m.id].n })}</div>
          </div>`).join('');
    } else {
      // Serien buendeln: dieselbe Person tippt dieselbe Aufgabe mehrmals in
      // Folge («Einkaufen ×3») → EINE Zeile mit Summenpunkten. So braucht es
      // keine Gross/Klein-Kachel-Varianten — dreimal tippen genuegt.
      const groups = [];
      for (const e of state.log) {
        // Serien enden an der Tagesgrenze (sonst zaehlt «×N» unter «Heute»
        // stillschweigend gestrige Eintraege mit)
        const key = e.member_id + '|' + (e.chore_id || 'n:' + e.chore_name) + '|' + new Date(e.done_at).toDateString();
        const g = groups[groups.length - 1];
        if (g && g.key === key) { g.entries.push(e); }
        else groups.push({ key, entries: [e] });
      }
      const dayKey = iso => new Date(iso).toDateString();
      const dayLabel = iso => {
        const d = new Date(iso), now = new Date();
        const y = new Date(now); y.setDate(now.getDate() - 1);
        if (d.toDateString() === now.toDateString()) return t('Heute');
        if (d.toDateString() === y.toDateString()) return t('Gestern');
        return d.toLocaleDateString(LOCALE, { weekday: 'long', day: 'numeric', month: 'long' });
      };
      let lastDay = null;
      listEl.innerHTML = groups.length
        ? groups.map(g => {
            const e = g.entries[0];                    // neuester der Serie
            const n = g.entries.length;
            const sum = g.entries.reduce((s, x) => s + (x.points || 0), 0);
            const ids = g.entries.map(x => x.id).join(',');
            const m = memberById(e.member_id);
            const d = new Date(e.done_at);
            const note = e.chore_note || '';
            const editable = g.entries.every(canEditLog);
            const inner = `
              <span class="dot" style="background:${esc(m ? m.color : '#C2CCC5')}"></span>
              <span class="what"><b>${esc(e.member_name)}</b> · ${esc(e.chore_name)}${n > 1 ? `<span class="xn">×${n}</span>` : ''}
                ${note ? `<div class="enote">${esc(note)}</div>` : ''}
                <div class="when">${d.toLocaleTimeString(LOCALE, { hour: '2-digit', minute: '2-digit' })}</div>
              </span>
              <span class="pts">+${sum}</span>`;
            return editable
              ? `<button class="entry" data-editlog="${ids}">${inner}</button>`
              : `<div class="entry">${inner}</div>`;
          }).map((html, i) => {
            const day = dayKey(groups[i].entries[0].done_at);
            const head = day !== lastDay ? `<div class="dayhead">${dayLabel(groups[i].entries[0].done_at)}</div>` : '';
            lastDay = day;
            return head + html;
          }).join('')
        : `<div class="empty"><b>${t('Noch nichts erledigt')}</b>${t('Jede gedrückte Aufgabe landet hier.')}</div>`;
    }
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.entmenu')) {
      document.querySelectorAll('.menupop').forEach(p => p.hidden = true);
    }
  });

  let toastTimer;
  (function () {
    const tEl = document.getElementById('toast');
    if (!tEl) return;
    let y0 = 0;
    tEl.addEventListener('touchstart', e => { y0 = e.touches[0].clientY; }, { passive: true });
    tEl.addEventListener('touchmove', e => {
      if (e.touches[0].clientY - y0 > 24) { tEl.classList.remove('show'); clearTimeout(toastTimer); }
    }, { passive: true });
  })();
  function toast(msg, action) {
    const t = document.getElementById('toast');
    t.textContent = '';
    t.append(msg);
    if (action) {
      const b = document.createElement('button');
      b.className = 'tact'; b.textContent = action.label;
      b.onclick = () => { t.classList.remove('show'); action.fn(); };
      t.append(b);
    }
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), action ? 5000 : 1800);
  }

  // ---------- Events ----------
  document.querySelector('.tabs').addEventListener('click', e => {
    const b = e.target.closest('.tab'); if (!b) return;
    view = b.dataset.view; invalidateOrder(); render();
  });

  document.getElementById('iamRow').addEventListener('click', e => {
    if (USER_SLUG) return; // persönlicher Link: Person ist fixiert
    const c = e.target.closest('.chip'); if (!c) return;
    me = c.dataset.mid; localStorage.setItem(LS_ME, me); render();
  });
  if (USER_SLUG) {
    document.documentElement.classList.add('userlink');
  } else {
    document.documentElement.classList.remove('userlink');
  }

  let pressLock = false;
  listEl.addEventListener('click', e => {
    // Punkte-Periode
    const p = e.target.closest('[data-p]');
    if (p) { period = p.dataset.p; render(); return; }
    // Einmalig: eintragen ohne Kachel
    if (e.target.closest('#oneOffTile')) { openChoreSheet(null, 'oneoff'); return; }
    // Aufgabe bearbeiten
    const ed = e.target.closest('[data-edit]');
    if (ed) { e.stopPropagation(); openChoreSheet(ed.dataset.edit); return; }
    // Verlauf: Kebab-Menü öffnen/schließen
    const kb = e.target.closest('[data-menu]');
    if (kb) {
      e.stopPropagation();
      const pop = document.getElementById('menu-' + kb.dataset.menu);
      document.querySelectorAll('.menupop').forEach(p => { if (p !== pop) p.hidden = true; });
      if (pop) pop.hidden = !pop.hidden;
      return;
    }
    // Bearbeiten (aus dem Menü) — Titel + Notiz der ganzen Serie
    const el2 = e.target.closest('[data-editlog]');
    if (el2) { openLogSheet(el2.dataset.editlog.split(',')); return; }
    // Rückgängig (aus dem Menü) — loescht die ganze Serie
    const u = e.target.closest('[data-undo]');
    if (u) { deleteLogEntries(u.dataset.undo.split(',')); return; }
    // Aufgabe gedrückt → Punkte!
    const card = e.target.closest('.chore');
    if (card && !pressLock) {
      const c = state.chores.find(x => x.id === card.dataset.cid); if (!c) return;
      // v4.35.0: Folge-Tipps sind jetzt GEWOLLT (Akkumulation) — der Lock
      // filtert nur noch Geister-Doppelklicks der Hardware (<250 ms).
      pressLock = true; setTimeout(() => pressLock = false, 250);
      if (!recordEntry(c)) return;
      save(); render();
      const fresh = listEl.querySelector('.chore[data-cid="' + c.id + '"]');
      if (fresh) { fresh.classList.add('flash'); setTimeout(() => fresh.classList.remove('flash'), 500); }
    }
  });

  // ---------- Boot-Splash → Kopf-Logo (v4.39.0) ----------
  // FLIP: Icon-Rechteck → #headLogo-Rechteck. KEIN transitionend (die
  // globale reduced-motion-Regel toetet Transitions → Event kaeme nie),
  // stattdessen feste Timeouts. Overlay ist pointer-events:none.
  (function () {
    const sp = document.getElementById('splash');
    if (!sp) return;
    const icon = sp.querySelector('img');
    const MIN = 550;                                  // ms ab navigationStart
    const finish = () => { document.documentElement.classList.remove('splash'); sp.remove(); };
    function morph() {
      const target = document.getElementById('headLogo');
      if (!target || matchMedia('(prefers-reduced-motion: reduce)').matches) return finish();
      const a = icon.getBoundingClientRect(), b = target.getBoundingClientRect();
      if (!a.width || !b.width) return finish();
      // border-radius NICHT animieren: scale() verkleinert die 24px optisch
      // auf ~6px — genau der Ziel-Radius des Kopf-Logos.
      icon.style.transform = `translate(${b.left - a.left}px, ${b.top - a.top}px) scale(${b.width / a.width})`;
      sp.style.background = 'transparent';
      setTimeout(finish, 480);
    }
    const arm = () => setTimeout(morph, Math.max(0, MIN - performance.now()));
    if (document.readyState !== 'loading') arm();
    else addEventListener('DOMContentLoaded', arm);
  })();

  // ---------- Verlauf: Löschen mit Undo-Fenster ----------
  // Lokal sofort weg; der Server-DELETE wird erst NACH dem Fenster gesendet.
  // Undo ist damit rein lokal — kein DELETE/INSERT-Wettrennen (push() ist
  // fire-and-forget, keine serielle Queue!). pendingDeletes schirmt die
  // Zeilen waehrenddessen gegen Pulls ab. Schliesst jemand die App im
  // Fenster, wird nichts geloescht — Wiederauferstehung schlaegt Verlust.
  const UNDO_MS = 5000;
  let pendingUndo = null;   // { entries, timer }
  function commitPendingUndo() {
    if (!pendingUndo) return;
    clearTimeout(pendingUndo.timer);
    for (const e of pendingUndo.entries) deleteRemote('log', e.id, () => {
      if (!state.log.some(x => x.id === e.id)) {
        state.log.push(e); state.log.sort((a, b) => (a.done_at < b.done_at ? 1 : -1)); save(); render();
      }
    });
    pendingUndo = null;
  }
  function deleteLogEntries(ids) {
    commitPendingUndo();                       // nur EIN offenes Fenster
    const entries = state.log.filter(x => ids.includes(x.id));
    if (!entries.length) return;
    state.log = state.log.filter(x => !ids.includes(x.id));
    for (const e of entries) pendingDeletes.set('log:' + e.id, { resolvedAt: null });
    save(); render();
    pendingUndo = { entries, timer: setTimeout(commitPendingUndo, UNDO_MS) };
    toast(t('Gelöscht') + (entries.length > 1 ? ` (${entries.length})` : ''), {
      label: t('Rückgängig'),
      fn: () => {
        if (!pendingUndo) return;
        clearTimeout(pendingUndo.timer);
        for (const e of pendingUndo.entries) pendingDeletes.delete('log:' + e.id);
        state.log = state.log.concat(pendingUndo.entries)
          .sort((a, b) => new Date(b.done_at) - new Date(a.done_at));
        pendingUndo = null;
        save(); render();
      }
    });
  }

  // ---------- Verlauf: Eintrag/Serie bearbeiten (Titel + Notiz) ----------
  let logSheetDirty = false;
  // Rechte-Modell (v4.38.0): Familien-Link = Admin (alles), persoenlicher
  // Link = nur eigene Verlaufs-Eintraege. Client-seitige Durchsetzung —
  // serverseitig teilen alle den Familien-Write-Key (siehe Onboarding-Doku).
  const canEditLog = en => !USER_SLUG || (!!me && en.member_id === me);
  function localDT(iso) {
    const d = new Date(iso), p = x => String(x).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
  }
  function openLogSheet(ids) {
    const first = state.log.find(x => x.id === ids[0]);
    if (!first) return;
    if (!ids.every(id => { const x = state.log.find(y => y.id === id); return !x || canEditLog(x); })) {
      toast(t('Nur eigene Einträge lassen sich bearbeiten')); return;
    }
    let sh = document.getElementById('logSheet');
    if (!sh) {
      sh = document.createElement('dialog');
      sh.id = 'logSheet';
      document.body.appendChild(sh);
      enableBackdropClose(sh, null, () => logSheetDirty);   // Formular-Regel: dirty schuetzt
    }
    const n = ids.length;
    sh.innerHTML = `<div class="sheet">
      <div class="grabber"></div>
      <div class="sheetbar">
        <div class="slot"><button type="button" class="barbtn del" id="delLog">${t('Löschen')}${n > 1 ? ` (${n})` : ''}</button></div>
        <h2>${t('Eintrag bearbeiten')}</h2>
        <div class="slot end"><button type="button" class="x" id="closeLog" aria-label="${t('Schließen')}">×</button></div>
      </div>
      <div class="field">
        <label for="lName">${t('Titel')}</label>
        <input id="lName" type="text" maxlength="60" value="${esc(first.chore_name)}" autocomplete="off">
      </div>
      ${n === 1 ? `<div class="field">
        <div class="ptsrow"><label for="lPts">${t('Punkte')}</label><output id="lPtsVal" for="lPts">${first.points}</output></div>
        <input type="range" id="lPts" min="0" max="${Math.max(MAXPTS, +first.points || 0)}" step="1" value="${first.points}">
      </div>` : ''}
      <div class="field">
        <label for="lNote">${t('Notiz')} <span style="font-weight:400;color:var(--muted)">${t('(optional)')}</span></label>
        <input id="lNote" type="text" maxlength="120" value="${esc(first.chore_note || '')}" autocomplete="off">
      </div>
      <div class="field">
        <label for="lTime">${t('Zeit')}${n > 1 ? ` <span style="font-weight:400;color:var(--muted)">${t('(verschiebt alle {n} gemeinsam)', { n })}</span>` : ''}</label>
        <input id="lTime" type="datetime-local" value="${localDT(first.done_at)}">
      </div>
      <button type="button" class="btn primary wide" id="saveLog">${t('Speichern')}</button>
    </div>`;
    logSheetDirty = false;
    sh.querySelector('.sheet').addEventListener('input', () => { logSheetDirty = true; });
    const lpSl = sh.querySelector('#lPts');
    if (lpSl) {
      syncPtsRange(lpSl, sh.querySelector('#lPtsVal'));
      lpSl.addEventListener('input', () => syncPtsRange(lpSl, sh.querySelector('#lPtsVal'), lpSl.value));
    }
    sh.querySelector('#closeLog').onclick = () => sh.close();
    sh.querySelector('#delLog').onclick = () => {
      sh.close();
      deleteLogEntries(ids);   // Undo-Toast ersetzt das confirm() — weniger Reibung, volle Reue-Option
    };
    sh.querySelector('#saveLog').onclick = () => {
      const name = sh.querySelector('#lName').value.trim();
      const note = sh.querySelector('#lNote').value.trim() || null;
      if (!name) return;
      // Zeit: Serie wird um dasselbe Delta VERSCHOBEN (Abstaende und
      // Reihenfolge bleiben), Einzeleintrag direkt gesetzt.
      const tv = sh.querySelector('#lTime').value;
      const delta = tv ? (new Date(tv) - new Date(first.done_at)) : 0;
      for (const id of ids) {
        const x = state.log.find(y => y.id === id);
        if (!x) continue;
        x.chore_name = name; x.chore_note = note;
        if (delta) x.done_at = new Date(new Date(x.done_at).getTime() + delta).toISOString();

        upsertRemote('log', [x]);

  function recordEntry(choreLike) {

    const m = memberById(me);
    // Folge-Tipp innerhalb 1 h auf dieselbe Sache: Punkte AUFADDIEREN statt

    // sich das Fenster von selbst. Alt-Serien (mehrzeilig) bleiben, wie sie
    // sind, und rendern weiter gebuendelt.
    const key = choreLike.id || 'n:' + choreLike.name;
    const recent = state.log.find(e => e.member_id === m.id
      && (e.chore_id || 'n:' + e.chore_name) === key
      && Date.now() - new Date(e.done_at).getTime() < 3600e3);
    if (recent) {
      recent.points += choreLike.points;
      upsertRemote('log', [recent]);   // v4.47.5: Punkte-Zusammenlegung pull-geschützt

      toast(t('+{p} für {name}', { p: choreLike.points, name: m.name }));
      return true;
    }
    const entry = {
      id: uid(), chore_id: choreLike.id || null,
      chore_name: choreLike.name, chore_note: choreLike.note || null,
      member_id: m.id, member_name: m.name,
      points: choreLike.points, done_at: new Date().toISOString()
    };
    state.log.unshift(entry);
    try { if (navigator.vibrate) navigator.vibrate(12); } catch {}

    createRemote('log', entry);

    const mark = () => { try { localStorage.setItem(K, APP_VERSION); } catch {} };
    if (!seen) { mark(); return; }               // Erstkontakt: still merken
    // INHALTS-verankert (v4.43.1, Maintainer: «soll nicht mit jeder Versionsnummer

    const NEWS_VERSION = '4.37.0';   // updates.html berichtet bis v4.37 — nur mit neuem Inhalt bumpen!
    const vcmp = (a, b) => {
      a = String(a).split('.').map(Number); b = String(b).split('.').map(Number);
      for (let i = 0; i < 3; i++) { const d = (a[i] || 0) - (b[i] || 0); if (d) return d; }

    if (ibar) ibar.hidden = true;
    sh.addEventListener('close', () => {
      try { localStorage.setItem(OB_KEY, '1'); } catch {}
      initInstallBar();
    }, { once: true });
    sh.querySelector('#closeOnboard').onclick = () => sh.close();
    const oi = sh.querySelector('#obInstall');
    if (oi) wireShInstall(oi);
    sh.querySelector('#obNext').onclick = () => { sh.close(); if (creator) openShareSheet(''); };
    if (!sh.open) sh.showModal();
  }
  function maybeOnboard() {
    if (onboardShown || !FAMILY || IS_STANDALONE || firstRunOpen) return;
    // NUR famName zaehlt als «Familie steht»: der Boot-State saet auch fuer
    // brandneue Familien ein lokales Standard-Mitglied — members waere ein
    // Fehlsignal und legte das Onboarding UEBER die Ersteinrichtung.
    if (!state.famName) return;
    try { if (localStorage.getItem(OB_KEY)) return; } catch {}
    if (document.querySelector('dialog[open]')) return;     // nie ueber andere Sheets legen
    onboardShown = true;
    openOnboardSheet(false);
  }
  function wireShInstall(btn) {
    btn.onclick = async () => {
      if (!deferredInstall) { btn.remove(); return; }
      const p = deferredInstall; deferredInstall = null;
      p.prompt();
      try {
        const { outcome } = await p.userChoice;
        if (outcome === 'accepted') btn.remove();       // «Installiert ✓» kommt via appinstalled
        else deferredInstall = p;                        // abgelehnt: Prompt aufheben
      } catch {}
    };
  }
  function injectShareInstall(sh) {
    if (!deferredInstall || sh.querySelector('#shInstall')) return;
    const sn = sh.querySelector('.savenote');
    if (!sn) return;                                     // z. B. persoenlicher Link (kein Admin-Block)
    const b = document.createElement('button');
    b.type = 'button'; b.className = 'btn primary wide'; b.id = 'shInstall';
    b.style.marginTop = '10px';
    b.textContent = t('Zum Home-Bildschirm hinzufügen');
    wireShInstall(b);
    sn.appendChild(b);
  }
  function openShareSheet(intro, expandInstall) {
    let sh = document.getElementById('shareSheet');
    if (!sh) {
      sh = document.createElement('dialog');
      sh.id = 'shareSheet';
      document.body.appendChild(sh);
      // Registrierung passiert unten pro Erst-Öffnung (dataset-Wache) —
      // hier NICHT nochmal, sonst laufen Swipe/Close-Handler doppelt (Audit v4.47.5)
    }
    // Mitglieder duerfen die persoenlichen Links ALLER Personen teilen (sonst
    // koennen sie niemanden einladen — genau daran scheiterte das Onboarding eines neuen Mitglieds).
    // Der Familien-/Admin-Link bleibt fuer sie verborgen.
    const own = USER_SLUG ? state.members.find(m => (m.url_slug || '').toLowerCase() === USER_SLUG) : null;
    const rows = state.members.map(m => {
      const url = userLink(m);
      const qr = qrDataUrl(url);
      return `<div class="shrow">
        <div class="shhead">
          <span class="dot" style="background:${esc(m.color)}">${esc(initial(m.name))}</span>
          <span class="shname">${esc(m.name || '—')}${own && m.id === own.id ? ' <span style="font-weight:400;color:var(--muted);font-size:12.5px">(du)</span>' : ''}</span>
          ${qr ? `<button class="qrtog" aria-label="${t('QR-Code anzeigen')}">QR</button>` : ''}
          <button class="shbtn" data-share="${esc(url)}" data-name="${esc(m.name || '')}">${t('Einladen')}</button>
        </div>
        ${qr ? `<div class="qrwrap" hidden>
          <img class="shqr" src="${qr}" alt="${t('QR-Code für {name}', { name: esc(m.name || '—') })}" width="116" height="116">
          <div class="qrcap">${t('Persönlicher Link für {name}', { name: esc(m.name || '—') })}</div>
        </div>` : ''}
      </div>`;
    }).join('');
    const famQr = qrDataUrl(familyLink());
    const appQr = qrDataUrl(appLink());
    const installBlock = `<details class="install"${expandInstall ? ' open' : ''}>
      <summary><span>📲 ${t('Als App zum Home-Bildschirm')}</span><span class="chev">▾</span></summary>
      ${installInstructionsHTML()}
    </details>`;
    sh.innerHTML = `<div class="sheet">
      <div class="grabber"></div>
      <div class="sheetbar">
        <div class="slot"></div>
        <h2>${t('Einladen')}</h2>
        <div class="slot end"><button class="x" id="closeShare" aria-label="${t('Schließen')}">×</button></div>
      </div>
      ${USER_SLUG ? '' : `<div class="shrow shfam" style="border-top:none;padding-top:4px">
        <div class="shhead">
          <span class="shname">${t('Admin-Link')}<br><span class="subnote">${t('Gibt vollen Zugriff auf alle Mitglieder und ihre Aktivitäten')}</span></span>
          ${famQr ? `<button class="qrtog" aria-label="${t('QR-Code anzeigen')}">QR</button>` : ''}
          <button class="shbtn" data-share="${esc(familyLink())}">${t('Einladen')}</button>
        </div>
        ${famQr ? `<div class="qrwrap" hidden>
          <img class="shqr" src="${famQr}" alt="${t('Familien-Link')}" width="116" height="116">
          <div class="qrcap">${t('Admin-Link')} · ${t('Gibt vollen Zugriff auf alle Mitglieder und ihre Aktivitäten')}</div>
        </div>` : ''}
        <div class="savenote">🔖 ${t('Wichtig: diesen Link sichern — als Lesezeichen oder auf dem Home-Bildschirm. Ohne ihn verliert ihr den Zugriff auf euren Haushalt.')}
          ${deferredInstall ? `<button type="button" class="btn primary wide" id="shInstall" style="margin-top:10px">${t('Zum Home-Bildschirm hinzufügen')}</button>` : ''}
        </div>
      </div>
      ${installBlock}`}
      <div style="font-weight:700;font-size:14px;color:var(--muted);margin:18px 0 0">${t('Persönliche Links')}
        <span class="subnote" style="font-weight:400">${t('Verschick sie an deine Mitbewohner oder Familie — jede Person loggt damit ihre Aufgaben')}</span></div>
      ${rows}
      ${USER_SLUG ? installBlock : ''}
      <div class="shrow shapp">
        <div class="shhead">
          <span class="shname">${t('Fairli weiterempfehlen')}<br><span class="subnote">${t('Für Freunde: startet einen neuen, leeren Haushalt — zum Beitreten euren Familien-Link nutzen')}</span></span>
          ${appQr ? `<button class="qrtog" aria-label="${t('QR-Code anzeigen')}">QR</button>` : ''}
          <button class="shbtn" data-share="${esc(appLink())}" data-app="1">${t('Empfehlen')}</button>
        </div>
        ${appQr ? `<div class="qrwrap" hidden>
          <img class="shqr" src="${appQr}" alt="Fairli-QR" width="116" height="116">
          <div class="qrcap">${t('Neuer, leerer Haushalt (zum Beitreten: Familien-Link)')}</div>
        </div>` : ''}
      </div>
      <button type="button" class="btn primary wide" id="doneShare">${t('Fertig')}</button>
      <div style="color:var(--muted);font-size:11.5px;text-align:center;margin-top:12px">Fairli ${esc(APP_VERSION)}</div>
    </div>`;
    sh.querySelector('#closeShare').onclick = () => sh.close();
    const gi = sh.querySelector('#shInstall');
    if (gi) wireShInstall(gi);
    sh.querySelector('#doneShare').onclick = () => sh.close();
    if (!sh.dataset.backdrop) { enableBackdropClose(sh); sh.dataset.backdrop = '1'; }
    sh.querySelectorAll('.qrtog').forEach(t => t.onclick = () => {
      const w = t.closest('.shrow').querySelector('.qrwrap');
      if (!w) return;
      const show = w.hasAttribute('hidden');
      if (show) { w.removeAttribute('hidden'); t.classList.add('on'); }
      else { w.setAttribute('hidden', ''); t.classList.remove('on'); }
    });
    sh.querySelectorAll('.shbtn').forEach(b => b.onclick = () => {
      if (b.dataset.app) {
        shareLink(b.dataset.share, 'Fairli', t('Fairli – Haushaltsaufgaben fair verteilt. Erstell hier euren Haushalt:'));
        return;
      }
      const nm = b.dataset.name;
      const fam = state.famName || t('unseren Aufgaben');
      shareLink(b.dataset.share, nm ? t('Link für {name}', { name: nm }) : t('Familien-Link'),
                nm ? t('{name}, mach mit bei {fam}:', { name: nm, fam }) : t('Mach mit bei {fam}:', { fam }));
    });
    sh.showModal();
  }
  document.getElementById('memberRows').addEventListener('click', async e => {
    // Kebab öffnen/schließen (gleiche Mechanik wie im Verlauf)
    const kb = e.target.closest('[data-mmenu]');
    if (kb) {
      e.stopPropagation();
      const pop = document.getElementById('mmenu-' + kb.dataset.mmenu);
      document.querySelectorAll('.menupop').forEach(p => { if (p !== pop) p.hidden = true; });
      if (pop) pop.hidden = !pop.hidden;
      return;
    }
    // Persönlichen Link dieser Person teilen
    const sh = e.target.closest('[data-mshare]');
    if (sh) {
      const m = memberById(sh.dataset.mshare);
      if (m) shareLink(userLink(m), t('Link für {name}', { name: m.name || '—' }),
                       t('{name}, mach mit bei {fam}:', { name: m.name || '', fam: state.famName || t('unseren Aufgaben') }));
      document.querySelectorAll('.menupop').forEach(p => p.hidden = true);
      return;
    }
    const dl = e.target.closest('[data-mdel]');
    if (!dl) return;
    if (state.members.length <= 1) { toast(t('Mindestens eine Person wird benötigt.')); return; }
    const id = dl.dataset.mdel;
    if (!confirm('Person entfernen? Ihre Punkte im Verlauf bleiben erhalten.')) return;
    state.members = state.members.filter(m => m.id !== id);
    if (me === id) { me = null; localStorage.removeItem(LS_ME); }
    changedMembers.delete(id);
    save(); renderMemberRows();
    const _delM = state.members.find(x => x.id === id) || null;
    deleteRemote('members', id, () => {
      if (_delM && !state.members.some(x => x.id === id)) { state.members.push(_delM); save(); render(); }
    });
    render();
  });
  document.getElementById('addMember').addEventListener('click', () => {
    const m = { id: uid(), name: '', color: palette[state.members.length % palette.length] };
    state.members.push(m); changedMembers.add(m.id);
    save(); renderMemberRows();
    const inputs = document.querySelectorAll('#memberRows input[type=text]');
    inputs[inputs.length - 1].focus();
  });
  function finishMembers() {
    state.members = state.members.filter(m => m.name.trim() !== '');
    if (!state.members.length) state.members = [{ id: uid(), name: 'Ich', color: palette[0] }];
    save(); memberSheet.close(); render();
    // geänderte/neue Personen synchronisieren (upsert)
    const ms = state.members.filter(m => changedMembers.has(m.id));
    // upsertRemote (v4.46.1): verschluesselt + Write-Key (v4.46.0) UND
    // Pull-Schutz — vorher schluckte ein Pull mit Vor-Commit-Snapshot die
    // neue Person bzw. setzte Umbenennungen zurueck (Maintainer-Live-Bugs).
    upsertRemote('members', ms);
    if (ms.length) toast(t('Gespeichert'));   // «unklar, ob es speichert» (Maintainer) — jetzt sagt es das
  }
  document.getElementById('closeMembers').addEventListener('click', finishMembers);   // × oben
  document.getElementById('doneMembers').addEventListener('click', finishMembers);    // Speichern unten

  // ---------- Sheets einheitlich schliessen: Backdrop-Tipp (Esc ist nativ) ----------
  // Klick auf den Dialog SELBST = Backdrop (der Inhalt liegt in .sheet).
  function enableBackdropClose(dlg, onClose, guard) {
    const doClose = onClose || (() => dlg.close());
    dlg.addEventListener('click', e => {
      if (e.target !== dlg) return;
      if (guard && guard()) return;
      doClose();
    });
    // Runterwischen schliesst (v4.42.2) — der Grabber verspricht es ja.
    // Gleiche Semantik wie Backdrop-Tipp: dirty-Guards (Formular-Regel)
    // blocken auch den Swipe, das Sheet federt dann zurueck.
    let startY = 0, dy = 0, t0 = 0, dragging = false, canDrag = false;
    dlg.addEventListener('touchstart', e => {
      const sc = dlg.querySelector('.sheet');
      startY = e.touches[0].clientY; dy = 0; t0 = performance.now();
      dragging = false;
      canDrag = !sc || sc.scrollTop <= 0;   // nur wenn der Inhalt oben steht
    }, { passive: true });
    dlg.addEventListener('touchmove', e => {
      if (!canDrag) return;
      dy = e.touches[0].clientY - startY;
      if (!dragging) {
        if (dy > 8) dragging = true;                       // Zug nach unten uebernimmt
        else if (dy < -4) { canDrag = false; return; }     // Zug nach oben = Inhalt scrollen
        else return;
      }
      if (e.cancelable) e.preventDefault();
      dlg.style.transition = 'none';
      dlg.style.transform = 'translateY(' + Math.max(0, dy) + 'px)';
    }, { passive: false });
    dlg.addEventListener('touchend', () => {
      if (!dragging) return;
      dragging = false;
      const v = dy / Math.max(1, performance.now() - t0);            // px/ms
      const wants = dy > 120 || (dy > 40 && v > 0.5);
      if (wants && !(guard && guard())) {
        dlg.style.transition = 'transform .18s ease-in';
        dlg.style.transform = 'translateY(110%)';
        setTimeout(doClose, 170);
      } else {
        dlg.style.transition = 'transform .18s ease';                 // zurueckfedern
        dlg.style.transform = '';
        setTimeout(() => { dlg.style.transition = ''; }, 200);
      }
    });
    dlg.addEventListener('close', () => { dlg.style.transform = ''; dlg.style.transition = ''; });
  }
  // Formular-Sheet: Backdrop-Tipp verwirft NICHT, wenn ungespeicherte Eingaben da sind
  // (bewusste Ausnahme — sonst ist getippter Text bei einem Fehltipp weg).
  enableBackdropClose(choreSheet, null, () => choreDirty);
  enableBackdropClose(memberSheet, finishMembers);

  // ---------- Start ----------
  if ('serviceWorker' in navigator) {
    let hadController = !!navigator.serviceWorker.controller;
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      // Neue Version hat übernommen → einmal neu laden (nicht bei Erstinstallation)
      if (hadController && !reloaded) { reloaded = true; location.reload(); }
      hadController = true;
    });
    // ABSOLUT registrieren (§5-Regel gilt auch hier): auf f/-Tiefpfaden zeigt
    // baseURI nach replaceState in die Tiefe — das relative 'sw.js' lief seit
    // der Hash→Pfad-Migration ins 404 und der catch schluckte es still.
    // Folge: Geräte OHNE Alt-Registrierung hatten NIE einen Service Worker.
    navigator.serviceWorker.register('/chores/sw.js')
      .then(reg => {
        document.addEventListener('visibilitychange', () => { if (!document.hidden) reg.update(); });
      })
      .catch(() => {});
  }
  document.addEventListener('visibilitychange', () => { if (!document.hidden && !firstRunOpen) { invalidateOrder(); pull(); } });
  setInterval(() => { if (!document.hidden && cfg && !firstRunOpen) pull(); }, 20000); // Auto-Sync alle 20 s
  render();
  // Brandneue Familie ohne lokalen Stand: Einrichtung sofort zeigen, nicht
  // erst nach dem ersten Netzwerk-Pull.
  if (!USER_SLUG && !state.members.length && !state.famName) firstRunSetup();
  // ---------- Ersetzter Link? (v4.47.0) ----------
  // Der Server-Grabstein (retired_families) blockte bisher nur INSERTS —
  // Nutzer eines rotierten Links sahen Cache-Daten und still scheiternde
  // Schreibungen und erfuhren NICHTS. Jetzt: Vollbild-Hinweis, klebrig
  // (Grabsteine sind endgültig — einmal erkannt, immer angezeigt, auch offline).
  function showRetired() {
    if (document.getElementById('retiredOverlay')) return;
    const d = document.createElement('div');
    d.id = 'retiredOverlay';
    d.style.cssText = 'position:fixed;inset:0;z-index:99;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:28px;text-align:center';
    d.innerHTML = `<div style="max-width:420px">
      <div style="font-size:44px;margin-bottom:14px">🔒</div>
      <h2 style="margin:0 0 10px">${t('Dieser Familien-Link wurde ersetzt')}</h2>
      <p style="color:var(--muted);line-height:1.55;margin:0">${t('Holt euch den neuen Link von eurem Admin — eure Daten sind sicher und warten dort.')}</p>
    </div>`;
    document.body.appendChild(d);
  }
  (function initRetiredCheck() {
    if (!FAMILY) return;
    let flag = null; try { flag = localStorage.getItem(LS_RET); } catch {}
    if (flag === '1') { showRetired(); return; }
    (async () => {
      try {
        await CRYPTO_READY;
        const ids = [FAMILY]; if (ROWFAM) ids.push(ROWFAM);
        const q = 'family_id=in.(' + ids.map(x => '"' + x + '"').join(',') + ')';
        const r = await fetch(cfg.url.replace(/\/+$/, '') + '/rest/v1/retired_families?select=family_id&' + q,
          { headers: { apikey: cfg.key, Authorization: 'Bearer ' + cfg.key } });
        const rows = r.ok ? await r.json() : [];
        if (rows.length) { try { localStorage.setItem(LS_RET, '1'); } catch {} showRetired(); }
      } catch {}
    })();
  })();
  pull();
})();
</script>
</body>
