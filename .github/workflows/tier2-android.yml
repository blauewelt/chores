name: tier2-android
# S4 aus TESTING_TIER2.md: Chrome oeffnet den persoenlichen Deep-Link des
# E2E-Testhaushalts; Assertion ueber UiAutomator-Dump. Dispatch-only.
on:
  workflow_dispatch:
  schedule:
    - cron: '7 3 * * *'    # nightly 03:07 UTC

jobs:
  s4-chrome-deeplink:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run scenario in emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash scripts/tier2-s4.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: s4-artifacts
          path: |
            final.xml
            ui.xml
            screen.png
